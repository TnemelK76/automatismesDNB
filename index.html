<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatismes Maths — DNB 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --purple-light: #EEEDFE; --purple-mid: #7F77DD; --purple-dark: #3C3489; --purple-deep: #26215C;
            --green-light: #EAF3DE; --green-dark: #27500A; --red-light: #FCEBEB; --red-dark: #501313;
            --bg: #F8F7FF; --surface: #ffffff; --text: #1a1a2e; --text2: #5a5a7a; --border: #E1E0EF; --orange-light: #FFF4E5;
    		--orange-dark: #B05B00;
        }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .app-container { width: 100%; max-width: 500px; background: var(--surface); border-radius: 24px; padding: 32px; box-shadow: 0 12px 40px rgba(60, 52, 137, 0.08); border: 1px solid var(--border); }
        .hidden { display: none !important; }
        h1 { font-weight: 600; font-size: 1.5rem; margin-bottom: 8px; color: var(--purple-deep); text-align: center; }
        .subtitle { color: var(--text2); margin-bottom: 24px; font-size: 0.95rem; text-align: center; }
        .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .theme-btn { background: var(--purple-light); border: 1px solid transparent; padding: 16px; border-radius: 16px; color: var(--purple-dark); font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
        .theme-btn:hover { background: #E5E3FF; border-color: var(--purple-mid); transform: translateY(-2px); }
        .theme-btn.all { grid-column: span 2; background: var(--purple-dark); color: white; }
        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .score-badge { background: var(--purple-light); color: var(--purple-dark); padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; }
        .progress-container { height: 8px; background: var(--purple-light); border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--purple-mid); width: 0%; transition: width 0.4s ease; }
        .question-text { font-size: 1.3rem; font-weight: 500; color: var(--purple-deep); margin-bottom: 20px; min-height: 80px; text-align: center; display: block; line-height: 2; padding-top: 10px; }
		.question-text small { display: block; margin-top: 8px; font-size: 0.9rem; line-height: 1.2; color: var(--purple-mid); }
		.katex-display { display: inline-block !important; margin: 0 !important; }
		#answer-input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid var(--border); font-size: 1.2rem; font-family: 'DM Mono', monospace; text-align: center; outline: none; margin-top: 5px; }
        .validate-btn { width: 100%; background: var(--purple-dark); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 600; font-size: 1.1rem; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 12px; font-weight: 500; text-align: center; }
        .feedback.correct { background: var(--green-light); color: var(--green-dark); }
		.feedback.partial {
			background: var(--orange-light);
			color: var(--orange-dark);
			border: 1px solid #FFD8A8;
		}
        .feedback.wrong { background: var(--red-light); color: var(--red-dark); }
		.svg-text {
			font-size: 14px;
			fill: currentColor;
			font-weight: 600;
			paint-order: stroke;
			stroke: var(--surface); /* La couleur du fond de ton appli */
			stroke-width: 3px;
			stroke-linecap: round;
			stroke-linejoin: round;
		}
		.math-shortcuts .katex-display, 
		.math-shortcuts .katex {
		    margin: 0 !important;
		    padding: 0 !important;
		    font-size: 1.2rem;
		}
		
		.math-shortcuts {
		    display: flex;       /* Aligne les boutons horizontalement */
		    gap: 8px;          /* Espace entre les boutons */
		    margin-top: 20px;
		    margin-bottom: 10px;
		    width: 100%;        /* Prend toute la largeur de l'app */
		}
		.short-btn:active {
		    background: var(--purple-mid);
		    transform: translateY(2px);
		}
		.short-btn {
			flex: 1;            /* Donne la même largeur à chaque bouton */
		    height: 55px;       /* Hauteur fixe pour éviter les déformations */
		    background: var(--purple-light);
		    border: 1px solid var(--border);
		    border-radius: 12px;
		    cursor: pointer;
		    display: flex;      /* Centre le contenu KaTeX à l'intérieur */
		    align-items: center;
		    justify-content: center;
		    transition: all 0.2s;
		    min-height: 50px;
			min-width: 0;
		}
		.history-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; border-bottom: 1px solid var(--border);}
		.history-table th { color: var(--text2); font-weight: 500; padding: 8px; border-bottom: 2px solid var(--border); }
		.history-table td { padding: 12px 8px; border-bottom: 1px solid var(--border); text-align: center; }
		.row-wrong { background-color: #fffafa; }
		.text-wrong { color: var(--red-dark); font-weight: bold; }
		.text-correct { color: var(--green-dark); font-weight: bold; }
		.row-partial {
		    background-color: var(--orange-light) !important;
		}
		.text-partial {
		    color: var(--orange-dark);
		    font-weight: bold;
		}
		/* Pour arrondir les coins du tableau */
		#history-container {
		    border-radius: 16px;
		    border: 1px solid var(--border);
		    overflow: hidden;
		    margin-bottom: 25px;
		}
		
    </style>
</head>
<body>

<div class="app-container">
    <div id="menu-screen">
        <h1>Automatismes DNB</h1>
        <p class="subtitle">Exerciseur automatisé pour s'entrainer</p>
		<p style="text-align: center; color: var(--text2); font-size: 0.85rem; margin-top: -15px; margin-bottom: 25px; font-style: italic;">
        Calculatrice interdite, mais papier et crayon vivement conseillés !
    </p>
        <div class="theme-grid">
            <button class="theme-btn" onclick="startQuiz('calc')">🔢 Nombres et calculs</button>
            <button class="theme-btn" onclick="startQuiz('alg')">🧩 Calcul littéral</button>
            <button class="theme-btn" onclick="startQuiz('geo')">📐 Espace et géométrie</button>
            <button class="theme-btn" onclick="startQuiz('proba')">📊 Probabilités et statistiques</button>
            <button class="theme-btn all" onclick="startQuiz('tout')">🚀 Tous les thèmes</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="question-header">
            <span id="label-theme" style="font-weight:600; color:var(--purple-mid);">Entraînement</span>
            <span class="score-badge">Score : <span id="live-score">0</span>/10</span>
        </div>
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <div id="question-text" class="question-text"></div>
        <input type="text" id="answer-input" placeholder="Réponse..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
		<div class="math-shortcuts">
		    <button type="button" class="short-btn" onclick="insertSymbol('*')">$\times$</button>
		    <button type="button" class="short-btn" onclick="insertSymbol('/')">$\frac{a}{b}$</button>
			<button type="button" class="short-btn" onclick="insertSymbol('²')">$x^2$</button>
			<button type="button" class="short-btn" onclick="insertSymbol('^')">$x^n$</button>
		</div>
        <button id="submit-btn" class="validate-btn" onclick="handleValidation()">Valider</button>
        <div id="feedback" class="feedback hidden"></div>
    </div>

    <div id="result-screen" class="hidden">
	    <h1>Résultats</h1>
	    <div style="font-size: 3.5rem; font-weight: 600; color: var(--purple-mid); margin: 20px 0; text-align: center;">
	        <span id="final-score-val">0</span>/10
	    </div>
	    <div id="history-container" style="margin-bottom: 20px;"></div> 
	    
	    <button class="validate-btn" onclick="location.reload()">Retour au menu</button>
	</div>
</div>

<script>
    const SCI_DATABASE = [
        // Grands nombres
        { v: "1200", a: "1,2 \\times 10^3" }, { v: "45000", a: "4,5 \\times 10^4" }, { v: "850", a: "8,5 \\times 10^2" },
        { v: "91000", a: "9,1 \\times 10^4" }, { v: "3000000", a: "3 \\times 10^6" }, { v: "7500", a: "7,5 \\times 10^3" },
        { v: "125000", a: "1,25 \\times 10^5" }, { v: "800000", a: "8 \\times 10^5" }, { v: "64000", a: "6,4 \\times 10^4" },
        { v: "10200", a: "1,02 \\times 10^4" }, { v: "55000000", a: "5,5 \\times 10^7" }, { v: "9900", a: "9,9 \\times 10^3" },
        { v: "400", a: "4 \\times 10^2" }, { v: "27000", a: "2,7 \\times 10^4" }, { v: "130", a: "1,3 \\times 10^2" },
        { v: "880000", a: "8,8 \\times 10^5" }, { v: "60000", a: "6 \\times 10^4" }, { v: "3140", a: "3,14 \\times 10^3" },
        { v: "5000000", a: "5 \\times 10^6" }, { v: "22000", a: "2,2 \\times 10^4" }, { v: "7000", a: "7 \\times 10^3" },
        { v: "410000", a: "4,1 \\times 10^5" }, { v: "1900000", a: "1,9 \\times 10^6" }, { v: "360", a: "3,6 \\times 10^2" },
        { v: "52000", a: "5,2 \\times 10^4" },
        // Petits nombres (inférieurs à 1)
        { v: "0,02", a: "2 \\times 10^{-2}" }, { v: "0,0007", a: "7 \\times 10^{-4}" }, { v: "0,6", a: "6 \\times 10^{-1}" },
        { v: "0,0044", a: "4,4 \\times 10^{-3}" }, { v: "0,00005", a: "5 \\times 10^{-5}" }, { v: "0,0081", a: "8,1 \\times 10^{-3}" },
        { v: "0,0003", a: "3 \\times 10^{-4}" }, { v: "0,019", a: "1,9 \\times 10^{-2}" }, { v: "0,000004", a: "4 \\times 10^{-6}" },
        { v: "0,052", a: "5,2 \\times 10^{-2}" }, { v: "0,00099", a: "9,9 \\times 10^{-4}" }, { v: "0,007", a: "7 \\times 10^{-3}" },
        { v: "0,000012", a: "1,2 \\times 10^{-5}" }, { v: "0,85", a: "8,5 \\times 10^{-1}" }, { v: "0,00002", a: "2 \\times 10^{-5}" },
        { v: "0,00041", a: "4,1 \\times 10^{-4}" }, { v: "0,066", a: "6,6 \\times 10^{-2}" }, { v: "0,0000033", a: "3,3 \\times 10^{-6}" },
        { v: "0,0015", a: "1,5 \\times 10^{-3}" }, { v: "0,0000078", a: "7,8 \\times 10^{-6}" }, { v: "0,04", a: "4 \\times 10^{-2}" },
        { v: "0,00022", a: "2,2 \\times 10^{-4}" }, { v: "0,000001", a: "1 \\times 10^{-6}" }, { v: "0,7", a: "7 \\times 10^{-1}" },
        { v: "0,0035", a: "3,5 \\times 10^{-3}" }
    ];

	function generateTriangleSVG(angleA, angleB, type = "normal") {
	    // Coordonnées fixes pour un triangle qui rentre parfaitement (180x100)
	    const x1 = 30,  y1 = 90;  // Bas Gauche
	    const x2 = 150, y2 = 90;  // Bas Droite
	    const x3 = 60,  y3 = 25;  // Sommet haut (décalé pour ne pas être isocèle)
	
	    const isRight = type === "rectangle";
	    
	    // Fonction pour dessiner les arcs (angles fixes pour le visuel)
	    const drawStaticArc = (x, y, start, end) => {
	        return `<path d="M ${x + Math.cos(start)*15} ${y + Math.sin(start)*15} A 15 15 0 0 1 ${x + Math.cos(end)*15} ${y + Math.sin(end)*15}" fill="none" stroke="var(--purple-mid)" stroke-width="1.5"/>`;
	    };
	
	    return `
	    <svg viewBox="0 0 180 110" style="max-width:220px; margin: 5px auto; display:block; overflow:visible;">
	        <path d="M ${x1} ${y1} L ${x2} ${y2} L ${x3} ${y3} Z" fill="none" stroke="var(--purple-dark)" stroke-width="2" />
	        
	        ${isRight ? 
	            `<path d="M ${x1} ${y1-12} L ${x1+12} ${y1-12} L ${x1+12} ${y1}" fill="none" stroke="var(--purple-mid)" stroke-width="1.5"/>` : 
	            drawStaticArc(x1, y1, -1.1, 0) + `<text x="${x1+18}" y="${y1-5}" font-size="11" fill="var(--purple-deep)" font-weight="bold">${angleA}°</text>`
	        }
	
	        ${drawStaticArc(x2, y2, 3.14, 3.8)}
	        <text x="${x2-38}" y="${y1-5}" font-size="11" fill="var(--purple-deep)" font-weight="bold">${angleB}°</text>
	        
	        <text x="${x3-5}" y="${y3+25}" font-size="16" fill="var(--red-dark)" font-weight="bold">?</text>
	    </svg>`;
	}
		
    const GENERATORS = {
        calc: [
            () => {
                const d1 = [2, 3, 4, 5][Math.floor(Math.random() * 4)];
                const k = [2, 3, 4][Math.floor(Math.random() * 3)];
                const d2 = d1 * k;
                const n1 = Math.floor(Math.random() * 5) + 1; 
                const n2 = Math.floor(Math.random() * 5) + 1;
                const reverse = Math.random() > 0.5;
                const q = reverse ? `\\frac{${n2}}{${d2}} + \\frac{${n1}}{${d1}}` : `\\frac{${n1}}{${d1}} + \\frac{${n2}}{${d2}}`;
                const numFinal = n1 * k + n2;
                return { q: `Calculer : $${q}$`, a: `${numFinal}/${d2}`, h: `Mets tout sur $${d2}$.` };
            },
            () => {
                const r = Math.random();
                let type, div, n;
                if (r < 0.33) {
                    type = "tiers"; div = 3;
                    const multiplesDeTrois = [12, 15, 18, 21, 24, 27, 30, 33, 36, 45, 60, 75, 90, 120, 360, 630, 915, 1200];
                    n = multiplesDeTrois[Math.floor(Math.random() * multiplesDeTrois.length)];
                } else if (r < 0.66) {
                    type = "quart"; div = 4; n = (Math.floor(Math.random() * 30) + 1) * 4;
                } else {
                    type = "moitié"; div = 2; n = (Math.floor(Math.random() * 100) + 1) * 2;
                }
                return { q: `Quel est le ${type} de $${n}$ ?`, a: (n / div).toString(), h: `Divise par $${div}$.` };
            },
            () => {
                const entry = SCI_DATABASE[Math.floor(Math.random()*SCI_DATABASE.length)];
                return { q: `Donner l'écriture scientifique de $${entry.v}$ <br><small>(Utilise * pour multiplier et ^ pour puissance)</small>`, a: entry.a, h: "Un chiffre non nul avant la virgule." };
            },
            () => {
                const getPGCD = (a, b) => b === 0 ? a : getPGCD(b, a % b);
                let n, d, pgcd;
                do { n = Math.floor(Math.random() * 40) + 2; d = Math.floor(Math.random() * 40) + 2; pgcd = getPGCD(n, d); } while (pgcd === 1 || n === d);
                return { q: `Simplifier au maximum : $\\frac{${n}}{${d}}$`, a: `${n/pgcd}/${d/pgcd}`, h: `Divise par $${pgcd}$.` };
            },
            () => {
                const p = [50, 25, 10][Math.floor(Math.random() * 3)];
                let v = p === 25 ? (Math.floor(Math.random() * 10) + 1) * 4 : (Math.floor(Math.random() * 20) + 1) * 10;
                return { q: `Calculer $${p}\\%$ de $${v}$`, a: ((v * p) / 100).toString().replace('.', ','), h: `Divise par ${100/p}.` };
            },
            () => {
                const n = Math.floor(Math.random() * 12) + 1;
                return { q: `Calculer : $${n}^2$`, a: (n * n).toString(), h: `$${n} \\times ${n}$.` };
            }
        ],
        alg: [
            () => {
                const vars = ['x', 'y', 't', 'a', 'b'];
                const v = vars[Math.floor(Math.random() * vars.length)];
                const genCoef = () => { let c = 0; while(c === 0) c = Math.floor(Math.random() * 15) - 7; return c; };
                const c1 = genCoef(), c2 = genCoef(), c3 = genCoef(), n1 = genCoef();

                const fmt = (c, unit, first = false) => {
                    if (c === 0) return "";
                    let absC = Math.abs(c);
                    let displayC = (absC === 1 && unit !== "") ? "" : absC;
                    let sign = c < 0 ? "-" : (first ? "" : " + ");
                    if (!first && c < 0) sign = " - "; 
                    return sign + displayC + unit;
                };

                const enonce = fmt(c1, v + "^2", true) + fmt(c2, v) + fmt(n1, "") + fmt(c3, v);
                const resV2 = c1, resV = c2 + c3, resN = n1;
                let reponse = fmt(resV2, v + "^2", true) + fmt(resV, v) + fmt(resN, "");
                return { q: `Réduire l'expression : $${enonce}$`, a: reponse.replace(/\s+/g, ''), h: "Regroupe les familles." };
            },
            () => {
                const vars = ['x', 'y', 'a', 'b'];
                const v = vars[Math.floor(Math.random() * vars.length)];
                const genRelatif = () => { let n = 0; while(n === 0) n = Math.floor(Math.random() * 15) - 7; return n; };
                const k = genRelatif(), a = Math.floor(Math.random() * 5) + 2, b = genRelatif();
                const enonce = `${k}(${a}${v} ${b > 0 ? "+" : "-"} ${Math.abs(b)})`;
                const reponse = `${k*a}${v}${ (k*b) > 0 ? "+" + (k*b) : (k*b) }`;
                return { q: `Développer l'expression : $${enonce}$`, a: reponse.replace(/\s+/g, ''), h: "Distribue et gère les signes." };
            },
            () => {
                const isHard = Math.random() > 0.5;
                const isFractional = Math.random() > 0.4;
                if (!isHard) {
                    let a = Math.floor(Math.random() * 7) + 2, b = Math.floor(Math.random() * 10) - 5, c = Math.floor(Math.random() * 15) - 5;
                    if (isFractional) {
                        return { q: `Résoudre : $${a}x ${b >= 0 ? "+" : "-"} ${Math.abs(b)} = ${c}$`, a: (c-b) + "/" + a, h: "La réponse peut être une fraction." };
                    } else {
                        const sol = Math.floor(Math.random() * 15) - 7;
                        c = a * sol + b;
                        return { q: `Résoudre : $${a}x ${b >= 0 ? "+" : "-"} ${Math.abs(b)} = ${c}$`, a: sol.toString(), h: "Isole x." };
                    }
                } else {
                    let a, c; do { a = Math.floor(Math.random()*9)-4; c = Math.floor(Math.random()*9)-4; } while (a === c || a === 0 || c === 0);
                    const b = Math.floor(Math.random()*15)-7, d = Math.floor(Math.random()*15)-7;
                    const num = d - b, den = a - c;
                    const fmtE = (coeff, variable, first) => {
                        let res = Math.abs(coeff) === 1 ? (coeff < 0 ? "-" : "") + variable : coeff + variable;
                        if (!first && coeff > 0) res = "+" + res;
                        return res;
                    };
                    const enonce = `${fmtE(a, 'x', true)}${b >= 0 ? "+" : ""}${b} = ${fmtE(c, 'x', true)}${d >= 0 ? "+" : ""}${d}`;
                    return { q: `Résoudre : $${enonce.replace(/\+\-/g, "-")}$`, a: num + "/" + den, h: "Donne une fraction si besoin." };
                }
            }
        ],
        geo: [
            () => {			
                const typePyth = Math.floor(Math.random() * 3); 
                if (typePyth === 0) {
                    const noms = [["A","B","C"], ["R","S","T"], ["I","J","K"]][Math.floor(Math.random()*3)];
                    const [p1, p2, p3] = noms; 
                    const svg = `<br><svg width="160" height="100" viewBox="0 0 160 100"><path d="M 40,20 L 40,80 L 120,80 Z" fill="none" stroke="currentColor" stroke-width="2"/><rect x="40" y="72" width="8" height="8" fill="none" stroke="currentColor" /><text x="35" y="15" font-size="14" fill="currentColor">${p1}</text><text x="30" y="95" font-size="14" fill="currentColor">${p2}</text><text x="125" y="95" font-size="14" fill="currentColor">${p3}</text></svg>`;
                    return { q: `Écrire l'égalité de Pythagore pour ce triangle rectangle en ${p2} :${svg}`, a: `${p2}${p1}^2+${p2}${p3}^2=${p1}${p3}^2`, h: "Hypoténuse² = somme des carrés des deux autres côtés." };
                } 
                else {
                    const triplets = [[3,4,5], [6,8,10], [5,12,13]];
				    const [a, b, c] = triplets[Math.floor(Math.random()*triplets.length)];
				    const unit = Math.random() > 0.5 ? "cm" : "m"; // Choix de l'unité
				    const chercherHypo = Math.random() > 0.5;
				    
				    const svg = `<br><svg width="160" height="100" viewBox="0 0 160 100">
				        <path d="M 40,20 L 40,80 L 120,80 Z" fill="none" stroke="currentColor" stroke-width="2"/>
				        <rect x="40" y="72" width="8" height="8" fill="none" stroke="currentColor" />
				        <text x="15" y="55" font-size="12" fill="currentColor">${a}${unit}</text>
				        <text x="75" y="95" font-size="12" fill="currentColor">${chercherHypo ? b + unit : "?"}</text>
				        <text x="85" y="45" font-size="12" fill="currentColor">${chercherHypo ? "?" : c + unit}</text>
				    </svg>`;
				    
				    return { 
				        q: `${chercherHypo ? "Calculer l'hypoténuse" : "Calculer le côté manquant"} (n'oublie pas l'unité) :${svg}`, 
				        a: (chercherHypo ? c : b) + ` \\text{ ${unit}}`, // La réponse attendue inclut l'unité
				        h: `Réponse attendue en ${unit}.` 
				    };
                }
            },
            
			() => {
			    const isPapillon = Math.random() > 0.5;
			    const isCalcul = Math.random() > 0.5;
			    const noms = [["K","A","B","C","D"], ["S","M","N","P","G"], ["O","I","J","R","T"]][Math.floor(Math.random()*3)];

			    // --- Ajout des variables pour les unités ---

			    let svg = "";
			    if (isPapillon) {

			            <text x="112" y="65" class="svg-text">${S}</text>

			    } else {
			        // CONFIG EMBOÎTÉE (Classique)
			        svg = `<br><svg width="200" height="150" viewBox="0 0 200 150">
			            <path d="M 100,20 L 30,130 L 170,130 Z" fill="none" stroke="currentColor" stroke-width="2"/>
			            <line x1="58" y1="85" x2="142" y2="85" stroke="currentColor" stroke-width="2"/>

			            <text x="40" y="90" class="svg-text">${BL}</text><text x="150" y="90" class="svg-text">${BR}</text>
			        </svg>`;
			    }
			
			    if (!isCalcul) {
			        // Rapports alignés : S-Haut / S-Bas
			        const d1 = isPapillon ? `${S}${BL}/${S}${AR}` : `${S}${BL}/${S}${AL}`;
			        const d2 = isPapillon ? `${S}${BR}/${S}${AL}` : `${S}${BR}/${S}${AR}`;
			        const b = `${BL}${BR}/${AL}${AR}`;
			        return { 
			            q: `Écrire l'égalité des rapports de Thalès ((${BL}${BR}) // (${AL}${AR})) :${svg}`, 
			            a: `${d1}=${d2}=${b}`, 
			            h: "Associe les segments sur la même droite passant par le sommet." 
			        };
			    } else {
			        const k = [2, 2.5, 3, 1.5][Math.floor(Math.random()*4)];
			        const petit = Math.floor(Math.random()*3)+2; 
			        const baseP = Math.floor(Math.random()*3)+3;
			        const grandSide = isPapillon ? S+AR : S+AL;
			        
			        // On ajoute l'unité aux valeurs numériques de l'énoncé
			        return { 
			            q: `Sachant que (${BL}${BR}) // (${AL}${AR}), ${S}${BL}=${petit} ${unit}, ${grandSide}=${(petit*k).toString().replace('.', ',')} ${unit} et ${BL}${BR}=${baseP} ${unit}. <br>Calculer ${AL}${AR} (n'oublie pas l'unité) :${svg}`, 
			            a: (baseP*k).toString().replace('.', ',') + ` \\text{ ${unit}}`, 
			            h: `Agrandissement de rapport $${k}$. Réponse attendue en ${unit}.` 
			        };
			    }
			},

            () => {
                // Triangle rectangle : angle droit en p2 (bas-gauche), p1 (haut), p3 (bas-droite)
                // Côtés nommés depuis l'angle choisi :
                //   angle en p1 → opposé=p2p3 (bas), adjacent=p1p2 (gauche), hypo=p1p3 (hypo)
                //   angle en p3 → opposé=p1p2 (gauche), adjacent=p2p3 (bas), hypo=p1p3 (hypo)
                const noms = [["A","B","C"], ["R","S","T"], ["I","J","K"], ["U","V","W"], ["D","E","F"]][Math.floor(Math.random()*5)];
                const [p1, p2, p3] = noms;
                const angleEn = Math.random() > 0.5 ? p1 : p3; // angle choisi
                const ratio  = ["sin","cos","tan"][Math.floor(Math.random()*3)];

                // Segments nommés (paire de lettres dans l'ordre alphabétique du nom de côté)
                const seg = (a, b) => a < b ? a+b : b+a; // ordre alphabétique non requis — on garde l'ordre naturel des points
                const hypo = p1+p3, vert = p1+p2, horiz = p2+p3;

                let opp, adj;
                if (angleEn === p1) { opp = horiz; adj = vert; }
                else                { opp = vert;  adj = horiz; }

                // Réponse correcte : fraction de deux segments
                let ansNum, ansDen;
                if      (ratio === "sin") { ansNum = opp;  ansDen = hypo; }
                else if (ratio === "cos") { ansNum = adj;  ansDen = hypo; }
                else                     { ansNum = opp;  ansDen = adj;  }

                // Arcs centrés sur chaque sommet :
                // p1=(40,20) : côté vertical vers le bas → point à (40,32) ; hypo vers p3 → point à (50,27)
                // p3=(120,80) : côté horizontal vers la gauche → point à (108,80) ; hypo vers p1 → point à (111,73)
                const arcP1 = `<path d="M 40,32 A 12,12 0 0 0 50,27" fill="none" stroke="var(--purple-mid)" stroke-width="1.5"/>`;
                const arcP3 = `<path d="M 108,80 A 12,12 0 0 1 111,73" fill="none" stroke="var(--purple-mid)" stroke-width="1.5"/>`;
                const arc = angleEn === p1 ? arcP1 : arcP3;
                const svg = `<br><svg width="160" height="100" viewBox="0 0 160 100">
                    <path d="M 40,20 L 40,80 L 120,80 Z" fill="none" stroke="currentColor" stroke-width="2"/>
                    <rect x="40" y="72" width="8" height="8" fill="none" stroke="currentColor"/>
                    ${arc}
                    <text x="35" y="15" font-size="14" fill="currentColor">${p1}</text>
                    <text x="30" y="95" font-size="14" fill="currentColor">${p2}</text>
                    <text x="125" y="95" font-size="14" fill="currentColor">${p3}</text>
                </svg>`;

                return {
                    q: `Quel rapport faut-il calculer pour obtenir $\\${ratio}(\\widehat{${angleEn}})$ ?${svg}`,
                    a: `${ansNum}/${ansDen}`,
                    h: ratio === "sin" ? "sinus = opposé / hypoténuse"
                     : ratio === "cos" ? "cosinus = adjacent / hypoténuse"
                     :                  "tangente = opposé / adjacent"
                };
            },

			() => {
		        const isRight = Math.random() > 0.5;
		        let a1, a2, qText;
		
		        if (isRight) {
		            a1 = 90;
		            a2 = Math.floor(Math.random() * 70) + 10;
		            qText = "Dans ce triangle rectangle, calculer l'angle manquant :";
		        } else {
		            a1 = Math.floor(Math.random() * 60) + 30;
		            a2 = Math.floor(Math.random() * (180 - a1 - 40)) + 20;
		            qText = "Calculer la mesure de l'angle manquant :";
		        }
		
		        const ans = 180 - a1 - a2;
		        return {
		            q: `${qText}<br>${generateTriangleSVG(a1, a2, isRight ? "rectangle" : "normal")}`,
		            a: ans.toString() + "°",
		            h: "La somme des angles d'un triangle est toujours égale à $180°$."
		        };
		    }

        ],
        proba: [
            () => {
                const size = Math.random() > 0.5 ? 5 : 4;
                let s = Array.from({length: size}, () => Math.floor(Math.random() * 20) + 1);
                let sorted = [...s].sort((a, b) => a - b);
                let res = size === 5 ? sorted[2] : (sorted[1] + sorted[2]) / 2;
                return { q: `Déterminer la médiane de cette série : $${s.join(' \\, ; \\, ')}$`, a: res.toString().replace('.', ','), h: "Range dans l'ordre croissant." };
            },
            () => {
                const nbVal = [3, 4, 5][Math.floor(Math.random() * 3)];
                let vals, sum;
                do { vals = Array.from({length: nbVal}, () => Math.floor(Math.random() * 20)); sum = vals.reduce((a, b) => a + b, 0); } while (sum % nbVal !== 0 && (sum * 10) % nbVal !== 5); 
                return { q: `Calculer la moyenne de : $${vals.join(' \\, ; \\, ')}$`, a: (sum / nbVal).toString().replace('.', ','), h: "Somme / Effectif total." };
            },
            () => {
                const s = Array.from({length: 5}, () => Math.floor(Math.random() * 40));
                return { q: `Quelle est l'étendue de cette série : $${s.join(' \\, ; \\, ')}$ ?`, a: (Math.max(...s) - Math.min(...s)).toString(), h: "Max - Min." };
            },
            () => {
                const type = Math.floor(Math.random() * 4);
                if (type === 0) {
                    const r = Math.floor(Math.random() * 6) + 2, b = Math.floor(Math.random() * 6) + 2;
                    return { q: `Une urne contient ${r} boules rouges et ${b} bleues. Probabilité de tirer une bleue ?`, a: `${b}/${r+b}`, h: "favorable / total" };
                } else if (type === 1) {
                    const seuil = Math.floor(Math.random() * 3) + 2;
                    return { q: `Dé à 6 faces. Probabilité d'obtenir un nombre > ${seuil} ?`, a: `${6-seuil}/6`, h: "favorable / total" };
                } else if (type === 2) {
                    const p = Math.floor(Math.random() * 8) + 1;
                    return { q: `La probabilité qu'il pleuve est de $${p}/10$. Probabilité qu'il ne pleuve pas ?`, a: `${10-p}/10`, h: "Utilise l'événement contraire." };
                } else {
                    const secteurs = [8, 10, 12][Math.floor(Math.random()*3)]; const gagnants = Math.floor(Math.random()*3) + 1;
                    return { q: `Roue de loterie de ${secteurs} secteurs. ${gagnants} secteurs gagnants. Probabilité de gagner ?`, a: `${gagnants}/${secteurs}`, h: "favorable / total" };
                }
            }
        ]
    };

    let session = [], currentIdx = 0, score = 0, isLocked = false;

	function normalizeAlgebra(str) {
	    if (!str) return "";
	    
	    // 1. Nettoyage de base
	    let s = str.toLowerCase().replace(/\s+/g, '').replace(/-/g, '+-');
	    
	    // 2. Découpage par les '+' (en gardant les '-' attachés aux nombres)
	    let terms = s.split('+').filter(t => t !== "");
	    
	    // 3. Transformation des termes pour la comparaison
	    // Ex: "x" devient "1x", "-x" devient "-1x"
	    terms = terms.map(t => {
	        if (t === "x") return "1x";
	        if (t === "-x") return "-1x";
	        return t;
	    });
	
	    // 4. Tri alphabétique/numérique : les x^2 d'abord, puis x, puis les nombres
	    terms.sort((a, b) => {
	        const getPower = (term) => {
	            if (term.includes('^2')) return 2;
	            if (term.includes('x')) return 1;
	            return 0;
	        };
	        return getPower(b) - getPower(a) || a.localeCompare(b);
	    });
	
	    return terms.join('+').replace(/\+\-/g, '-');
	}

	function insertSymbol(symbol) {
	    const input = document.getElementById('answer-input');
	    const start = input.selectionStart;
	    const end = input.selectionEnd;
	    const text = input.value;
	
	    // Insère le symbole à la position du curseur
	    input.value = text.slice(0, start) + symbol + text.slice(end);
	
	    // Repositionne le curseur juste après le symbole inséré
	    input.selectionStart = input.selectionEnd = start + symbol.length;
	
	    // Redonne le focus à l'input pour que l'élève continue de taper
	    input.focus();
	}
	
    function handleValidation() {
    if(isLocked) return;
    const inputEl = document.getElementById('answer-input');
    const userRaw = inputEl.value.trim().toLowerCase().replace(',', '.');
    const q = session[currentIdx];
    const correctRaw = q.a.toLowerCase().replace(',', '.');
    let isCorrect = false;
	let partial = false;
		
    const clean = (s) => s.replace(/\s+/g, '');

	// 0. TRIGONOMÉTRIE (rapport de deux segments)
    if (q.q.includes("Quel rapport faut-il")) {
        // Accepte AB/CD, BA/CD, AB/DC, BA/DC — on trie les lettres de chaque segment
        const normSeg = (s) => clean(s).split('/').map(p => p.split('').sort().join('')).join('/');
        if (normSeg(userRaw) === normSeg(correctRaw)) isCorrect = true;
    }
	// Gestion unités
	else if (q.q.includes("Calcule") && (q.a.includes("cm") || q.a.includes("m") || q.a.includes("mm"))) {
	    // On nettoie tout : espaces, virgules, et les commandes KaTeX \text{ }
	    const userClean = userRaw.toLowerCase().replace(/\s/g, '').replace(',', '.');
	    const correctClean = q.a.toLowerCase()
	        .replace(/\\text\{/g, '') // Retire \text{
	        .replace(/\}/g, '')       // Retire }
	        .replace(/\s/g, '')       // Retire les espaces
	        .replace(',', '.');
	    
	    const userValue = userClean.replace(/[a-z]/g, '');
	    const correctValue = correctClean.replace(/[a-z]/g, '');
	
	    if (userClean === correctClean) {
	        isCorrect = true;
	    } else if (userValue === correctValue) {
	        partial = true;
	    }
	}
    // 1. THALÈS (Rapports)
    else if (q.q.includes("rapports de Thalès")) {
        const uR = clean(userRaw).split('=');
        const cR = clean(correctRaw).split('=');
        if (uR.length === 3) {
            const norm = (r) => r.split('/').map(s => s.split('').sort().join('')).sort().join('/');
            const uSet = uR.map(norm).sort().join('|');
            const cSet = cR.map(norm).sort().join('|');
            const cInv = cR.map(r => norm(r.split('/').reverse().join('/'))).sort().join('|');
            if (uSet === cSet || uSet === cInv) isCorrect = true;
        }
    }
    // 2. PYTHAGORE
    else if (q.q.includes("égalité de Pythagore")) {
	    const cleanUser = userRaw.replace(/\s+/g, '');
	    if (!cleanUser.includes('=')) { 
	        isCorrect = false; 
	    } else {
	        const [uL, uR] = cleanUser.split('=');
	        const [cL, cR] = correctRaw.replace(/\s+/g, '').split('=');
	
	        const normMembre = (membre) => {
	            return membre.split('+').map(seg => {
	                // Regex : cherche exactement 2 lettres + un carré (², ^2 ou 2)
	                const match = seg.match(/^([a-z]{2})(²|\^2|2)$/);
	                if (!match) return "INVALID"; 
	                return match[1].split('').sort().join('') + "2";
	            }).sort().join('+');
	        };
	
	        const uL_norm = normMembre(uL);
	        const uR_norm = normMembre(uR);
	        
	        // Si l'utilisateur a tapé "1", uL_norm sera "INVALID"
	        if (uL_norm.includes("INVALID") || uR_norm.includes("INVALID")) {
	            isCorrect = false;
	        } else {
	            const cL_norm = normMembre(cL);
	            const cR_norm = normMembre(cR);
	            isCorrect = (uL_norm === cL_norm && uR_norm === cR_norm) || 
	                        (uL_norm === cR_norm && uR_norm === cL_norm);
	        }
	    }
	}
	// Validation Somme des angles avec gestion du score partiel
	else if (q.q.includes("angle manquant")) {
	    const userClean = userRaw.replace(/\s/g, '');
	    const correctClean = q.a.replace(/\s/g, ''); // Contient le "°"
	    
	    const userValue = userClean.replace('°', '');
	    const correctValue = correctClean.replace('°', '');
	
	    if (userClean === correctClean) {
	        isCorrect = true;
	    } else if (userValue === correctValue) {
	        // L'élève a mis la bonne valeur numérique mais a oublié le "°"
	        partial = true; 
	    }
	}
	//Fraction uniquement irréductible dans simplifier
	else if (q.q.includes("Simplifier au maximum")) {
	    const uClean = userRaw.replace(/\s+/g, '');
	    const cClean = correctRaw.replace(/\s+/g, '');
	    
	    // Cas 1 : Correspondance exacte (ex: 3/4)
	    if (uClean === cClean) {
	        isCorrect = true;
	    } 
	    // Cas 2 : Le résultat est un entier (ex: attendu "5/1", reçu "5")
	    else if (cClean.endsWith('/1')) {
	        const integerPart = cClean.split('/')[0];
	        if (uClean === integerPart) {
	            isCorrect = true;
	        }
	    }
	}
	//ecriture scientifique
	else if (q.q.includes("scientifique")) {
		let u = userRaw.replace(/\s/g, '').replace('*', '×');
		let c = q.a.replace(/\\times/g, '×').replace(/[\{\}]/g, '').replace(/\s/g, '');
		if (u === c || u === c.replace('×10^', '*10^')) isCorrect = true;
	}
	//Accepter x= dans équation
	else if (q.q.includes("Résoudre")) {
        let userClean = clean(userRaw).replace('x=', '');
        let correctClean = clean(correctRaw).replace('x=', '');

        // Fonction pour convertir "7", "-7/-1" ou "1/2" en nombre décimal
        const toNum = (s) => {
            if (s.includes('/')) {
                const p = s.split('/');
                return parseFloat(p[0]) / parseFloat(p[1]);
            }
            return parseFloat(s);
        };

        const uVal = toNum(userClean);
        const cVal = toNum(correctClean);

        // Comparaison avec une petite marge d'erreur pour les arrondis
        if (!isNaN(uVal) && Math.abs(uVal - cVal) < 0.0001) {
            isCorrect = true;
        }
    }
    // 3. FRACTIONS & NOMBRES
    else if (correctRaw.includes('/')) {
        let uN, uD;
        if (userRaw.includes('/')) { const p = userRaw.split('/'); uN = Number(p[0]); uD = Number(p[1]); }
        else if (!isNaN(userRaw) && userRaw !== "") { uN = Number(userRaw); uD = 1; }
        if (uN !== undefined && !isNaN(uN) && !isNaN(uD) && uD !== 0) {
            const [cN, cD] = correctRaw.split('/').map(Number);
            if (uN * cD === cN * uD) isCorrect = true;
        }
	}
    // 4. RESTE (Algèbre, développement, réduction, etc.)
    else {
	    const userNorm = normalizeAlgebra(userRaw);
	    const correctNorm = normalizeAlgebra(correctRaw);
	    
	    if (userNorm === correctNorm) {
	        isCorrect = true;
	    }
	}

    // Affichage résultat
    isLocked = true;
    inputEl.disabled = true;
    document.getElementById('submit-btn').classList.add('hidden');
    const fb = document.getElementById('feedback');
    fb.classList.remove('hidden', 'correct', 'wrong');

	// On enregistre les données pour l'historique
    session[currentIdx].userAns = userRaw;
    session[currentIdx].status = isCorrect ? 'correct' : (partial ? 'partial' : 'wrong');
		
    if (isCorrect) {
	    score += 1;
	    fb.innerHTML = "✓ Parfait !";
	    fb.className = "feedback correct";
	} else if (partial) { // <--- Changé en 'partial' pour correspondre à votre variable
	    score += 0.5;
	    fb.innerHTML = `⚠ Valeur juste, mais attention à l'unité !<br>Réponse : $${q.a}$`;
	    fb.className = "feedback partial";
	} else {
	    fb.innerHTML = `✗ Réponse : $${q.a}$<br><small>${q.h}</small>`;
	    fb.className = "feedback wrong";
	}

    // CRUCIAL : Déclencher le rendu KaTeX sur le bloc feedback
    renderMathInElement(fb, {
        delimiters: [
            {left: "$$", right: "$$", display: true},
            {left: "$", right: "$", display: false}
        ],
        throwOnError: false
    });

    document.getElementById('live-score').textContent = score;
    setTimeout(next, isCorrect ? 1000 : 3000);
}

		    html += `

		            ${icon} ${q.userAns || '-'}
		        </td>
		        <td style="padding: 10px 12px; text-align: center;">$${q.a}$</td>

		});

        html += `</tbody></table></div>`;
        
        // On insère le tableau juste avant le bouton "Retour au menu"
        const resultDiv = document.getElementById('result-screen');
        const existingTable = document.getElementById('history-container');
        if(existingTable) existingTable.remove(); // Évite les doublons si on revient
        
        // On l'insère avant le bouton
        resultDiv.querySelector('button').insertAdjacentHTML('beforebegin', html);
        
        // Rendu des maths
        renderMathInElement(resultDiv, { delimiters: [{left: "$", right: "$", display: false}] });
    }
    document.getElementById('answer-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleValidation(); });
</script>
</body>
</html>
