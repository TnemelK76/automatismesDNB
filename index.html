<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatismes Maths — DNB 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --purple-light: #EEEDFE; --purple-mid: #7F77DD; --purple-dark: #3C3489; --purple-deep: #26215C;
            --green-light: #EAF3DE; --green-dark: #27500A; --red-light: #FCEBEB; --red-dark: #501313;
            --bg: #F8F7FF; --surface: #ffffff; --text: #1a1a2e; --text2: #5a5a7a; --border: #E1E0EF; --orange-light: #FFF4E5;
    		--orange-dark: #B05B00;
        }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .app-container { width: 100%; max-width: 500px; background: var(--surface); border-radius: 24px; padding: 32px; box-shadow: 0 12px 40px rgba(60, 52, 137, 0.08); border: 1px solid var(--border); }
        .hidden { display: none !important; }
        h1 { font-weight: 600; font-size: 1.5rem; margin-bottom: 8px; color: var(--purple-deep); text-align: center; }
        .subtitle { color: var(--text2); margin-bottom: 24px; font-size: 0.95rem; text-align: center; }
        .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .theme-btn { background: var(--purple-light); border: 1px solid transparent; padding: 16px; border-radius: 16px; color: var(--purple-dark); font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
        .theme-btn:hover { background: #E5E3FF; border-color: var(--purple-mid); transform: translateY(-2px); }
        .theme-btn.all { grid-column: span 2; background: var(--purple-dark); color: white; }
        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .score-badge { background: var(--purple-light); color: var(--purple-dark); padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; }
        .progress-container { height: 8px; background: var(--purple-light); border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--purple-mid); width: 0%; transition: width 0.4s ease; }
        .question-text { font-size: 1.3rem; font-weight: 500; color: var(--purple-deep); margin-bottom: 20px; min-height: 80px; text-align: center; display: block; line-height: 2; padding-top: 10px; }
		.question-text small { display: block; margin-top: 8px; font-size: 0.9rem; line-height: 1.2; color: var(--purple-mid); }
		.katex-display { display: inline-block !important; margin: 0 !important; }
		#answer-input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid var(--border); font-size: 1.2rem; font-family: 'DM Mono', monospace; text-align: center; outline: none; margin-top: 5px; }
        .validate-btn { width: 100%; background: var(--purple-dark); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 600; font-size: 1.1rem; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 12px; font-weight: 500; text-align: center; }
        .feedback.correct { background: var(--green-light); color: var(--green-dark); }
		.feedback.partial {
			background: var(--orange-light);
			color: var(--orange-dark);
			border: 1px solid #FFD8A8;
		}
        .feedback.wrong { background: var(--red-light); color: var(--red-dark); }
		.svg-text {
			font-size: 14px;
			fill: currentColor;
			font-weight: 600;
			paint-order: stroke;
			stroke: var(--surface); /* La couleur du fond de ton appli */
			stroke-width: 3px;
			stroke-linecap: round;
			stroke-linejoin: round;
		}
		.math-shortcuts .katex-display, 
		.math-shortcuts .katex {
		    margin: 0 !important;
		    padding: 0 !important;
		    font-size: 1.2rem;
		}
		
		.math-shortcuts {
		    display: flex;       /* Aligne les boutons horizontalement */
		    gap: 8px;          /* Espace entre les boutons */
		    margin-top: 20px;
		    margin-bottom: 10px;
		    width: 100%;        /* Prend toute la largeur de l'app */
		}
		.short-btn:active {
		    background: var(--purple-mid);
		    transform: translateY(2px);
		}
		.short-btn {
			flex: 1;            /* Donne la même largeur à chaque bouton */
		    height: 55px;       /* Hauteur fixe pour éviter les déformations */
		    background: var(--purple-light);
		    border: 1px solid var(--border);
		    border-radius: 12px;
		    cursor: pointer;
		    display: flex;      /* Centre le contenu KaTeX à l'intérieur */
		    align-items: center;
		    justify-content: center;
		    transition: all 0.2s;
		    min-height: 50px;
			min-width: 0;
		}
		.history-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; border-bottom: 1px solid var(--border);}
		.history-table th { color: var(--text2); font-weight: 500; padding: 8px; border-bottom: 2px solid var(--border); }
		.history-table td { padding: 12px 8px; border-bottom: 1px solid var(--border); text-align: center; }
		.row-wrong { background-color: #fffafa; }
		.text-wrong { color: var(--red-dark); font-weight: bold; }
		.text-correct { color: var(--green-dark); font-weight: bold; }
		.row-partial {
		    background-color: var(--orange-light) !important;
		}
		.text-partial {
		    color: var(--orange-dark);
		    font-weight: bold;
		}
		/* Pour arrondir les coins du tableau */
		#history-container {
		    border-radius: 16px;
		    border: 1px solid var(--border);
		    overflow: hidden;
		    margin-bottom: 25px;
		}
		/* On cible uniquement les SVG de figures, pas les symboles KaTeX */
		.mini-svg-container > br + svg, 
		.mini-svg-container > svg {
		    max-width: 110px !important;
		    height: auto !important;
		    transition: all 0.3s ease;
		    cursor: zoom-in;
		    display: block;
		    margin: 8px auto;
		}
		
		/* L'effet de survol UNIQUEMENT sur la figure */
		.mini-svg-container > br + svg:hover,
		.mini-svg-container > svg:hover {
		    transform: scale(2.2);
		    position: relative;
		    z-index: 100;
		    background: white;
		    border-radius: 4px;
		    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
		    padding: 5px;
		}
		
		/* On s'assure que les SVG de KaTeX (chapeaux d'angles, racines...) restent intacts */
		.katex svg {
		    display: inline !important;
		    max-width: none !important;
		    transform: none !important;
		    box-shadow: none !important;
		    transition: none !important;
		    margin: 0 !important;
		    cursor: default !important;
		}
		
		/* Empêche les lignes du tableau de bouger pendant le zoom */
		.history-q-cell {
		    overflow: visible !important; /* Important pour que le zoom ne soit pas coupé */
		}
		
    </style>
</head>
<body>

<div class="app-container">
    <div id="menu-screen">
        <h1>Automatismes DNB</h1>
        <p class="subtitle">Exerciseur automatisé pour s'entrainer</p>
		<p style="text-align: center; color: var(--text2); font-size: 0.85rem; margin-top: -15px; margin-bottom: 25px; font-style: italic;">
        Calculatrice interdite, mais papier et crayon vivement conseillés !
    </p>
        <div class="theme-grid">
		    <button class="theme-btn" onclick="startQuiz('calc')" 
		        style="background:#E3F2FD; color:#0D47A1; border-color: #BBDEFB;">
		        🔢 Nombres et calculs
		    </button>
		    
		    <button class="theme-btn" onclick="startQuiz('alg')" 
		        style="background:#FFF9C4; color:#F57F17; border-color: #FFF176;">
		        🧩 Calcul littéral et fonctions
		    </button>
		    
		    <button class="theme-btn" onclick="startQuiz('geo')" 
		        style="background:var(--green-light); color:var(--green-dark); border-color: #B2D281;">
		        📐 Espace, géométrie et grandeurs 
		    </button>
		    
		    <button class="theme-btn" onclick="startQuiz('proba')" 
		        style="background:#FCE4EC; color:#880E4F; border-color: #F8BBD0;">
		        📊 Probabilités et statistiques
		    </button>
		    
		    <button class="theme-btn" onclick="startQuiz('scratch')" 
		        style="background:var(--orange-light); color:var(--orange-dark); border-color: #FFD8A8;">
		        🐱 Algorithmique Scratch
		    </button>
		    
		    <button class="theme-btn all" onclick="startQuiz('tout')">
		        🚀 Tous les thèmes
		    </button>
		</div>

    <div id="quiz-screen" class="hidden">
        <div class="question-header">
            <span id="label-theme" style="font-weight:600; color:var(--purple-mid);">Entraînement</span>
            <span class="score-badge">Score : <span id="live-score">0</span>/10</span>
        </div>
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <div id="question-text" class="question-text"></div>
        <input type="text" id="answer-input" placeholder="Réponse..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
		<div class="math-shortcuts">
		    <button type="button" class="short-btn" onclick="insertSymbol('*')">$\times$</button>
		    <button type="button" class="short-btn" onclick="insertSymbol('/')">$\frac{a}{b}$</button>
			<button type="button" class="short-btn" onclick="insertSymbol('²')">$x^2$</button>
			<button type="button" class="short-btn" onclick="insertSymbol('^')">$x^n$</button>
		</div>
        <button id="submit-btn" class="validate-btn" onclick="handleValidation()">Valider</button>
        <div id="feedback" class="feedback hidden"></div>
    </div>

    <div id="result-screen" class="hidden">
	    <h1>Résultats</h1>
	    <div style="font-size: 3.5rem; font-weight: 600; color: var(--purple-mid); margin: 20px 0; text-align: center;">
	        <span id="final-score-val">0</span>/10
	    </div>
	    <div id="history-container" style="margin-bottom: 20px;"></div> 
	    
	    <button class="validate-btn" onclick="location.reload()">Retour au menu</button>
	</div>
	<footer style="margin-top: 30px; padding-top: 15px; border-top: 1px solid var(--border); text-align: center; color: var(--text2); font-size: 0.8rem;">
	    <p style="font-style: italic;">Application développée à l'aide de l'IA</p>
	    <p style="margin-top: 5px;">&copy; 2026 Clément CORBIÈRE</p>
	</footer>
</div>

<script>
    const SCI_DATABASE = [
        // Grands nombres
        { v: "1200", a: "1,2 \\times 10^3" }, { v: "45000", a: "4,5 \\times 10^4" }, { v: "850", a: "8,5 \\times 10^2" },
        { v: "91000", a: "9,1 \\times 10^4" }, { v: "3000000", a: "3 \\times 10^6" }, { v: "7500", a: "7,5 \\times 10^3" },
        { v: "125000", a: "1,25 \\times 10^5" }, { v: "800000", a: "8 \\times 10^5" }, { v: "64000", a: "6,4 \\times 10^4" },
        { v: "10200", a: "1,02 \\times 10^4" }, { v: "55000000", a: "5,5 \\times 10^7" }, { v: "9900", a: "9,9 \\times 10^3" },
        { v: "400", a: "4 \\times 10^2" }, { v: "27000", a: "2,7 \\times 10^4" }, { v: "130", a: "1,3 \\times 10^2" },
        { v: "880000", a: "8,8 \\times 10^5" }, { v: "60000", a: "6 \\times 10^4" }, { v: "3140", a: "3,14 \\times 10^3" },
        { v: "5000000", a: "5 \\times 10^6" }, { v: "22000", a: "2,2 \\times 10^4" }, { v: "7000", a: "7 \\times 10^3" },
        { v: "410000", a: "4,1 \\times 10^5" }, { v: "1900000", a: "1,9 \\times 10^6" }, { v: "360", a: "3,6 \\times 10^2" },
        { v: "52000", a: "5,2 \\times 10^4" },
        // Petits nombres (inférieurs à 1)
        { v: "0,02", a: "2 \\times 10^{-2}" }, { v: "0,0007", a: "7 \\times 10^{-4}" }, { v: "0,6", a: "6 \\times 10^{-1}" },
        { v: "0,0044", a: "4,4 \\times 10^{-3}" }, { v: "0,00005", a: "5 \\times 10^{-5}" }, { v: "0,0081", a: "8,1 \\times 10^{-3}" },
        { v: "0,0003", a: "3 \\times 10^{-4}" }, { v: "0,019", a: "1,9 \\times 10^{-2}" }, { v: "0,000004", a: "4 \\times 10^{-6}" },
        { v: "0,052", a: "5,2 \\times 10^{-2}" }, { v: "0,00099", a: "9,9 \\times 10^{-4}" }, { v: "0,007", a: "7 \\times 10^{-3}" },
        { v: "0,000012", a: "1,2 \\times 10^{-5}" }, { v: "0,85", a: "8,5 \\times 10^{-1}" }, { v: "0,00002", a: "2 \\times 10^{-5}" },
        { v: "0,00041", a: "4,1 \\times 10^{-4}" }, { v: "0,066", a: "6,6 \\times 10^{-2}" }, { v: "0,0000033", a: "3,3 \\times 10^{-6}" },
        { v: "0,0015", a: "1,5 \\times 10^{-3}" }, { v: "0,0000078", a: "7,8 \\times 10^{-6}" }, { v: "0,04", a: "4 \\times 10^{-2}" },
        { v: "0,00022", a: "2,2 \\times 10^{-4}" }, { v: "0,000001", a: "1 \\times 10^{-6}" }, { v: "0,7", a: "7 \\times 10^{-1}" },
        { v: "0,0035", a: "3,5 \\times 10^{-3}" }
    ];

	function generateTriangleSVG(angleA, angleB, type = "normal") {
	    const isRight = type === "rectangle";
	    let x1, y1, x2, y2, x3, y3;
	    
	    if (isRight) {
	        x1 = 40;  y1 = 100; x2 = 150; y2 = 100; x3 = 40;  y3 = 30;
	    } else {
	        x1 = 30;  y1 = 100; x2 = 150; y2 = 100; x3 = 75;  y3 = 30;
	    }
	
	    const drawArc = (x, y, startAngleRad, endAngleRad) => {
	        const r = 18;
	        const xS = x + r * Math.cos(startAngleRad);
	        const yS = y + r * Math.sin(startAngleRad);
	        const xE = x + r * Math.cos(endAngleRad);
	        const yE = y + r * Math.sin(endAngleRad);
	        return `<path d="M ${xS} ${yS} A ${r} ${r} 0 0 1 ${xE} ${yE}" fill="none" stroke="var(--purple-mid)" stroke-width="1.5"/>`;
	    };
	
	    // Calcul de la position du ?
	    // Rectangle : un peu plus à droite | Quelconque : centré sous le sommet
	    const qMarkX = isRight ? x3 + 12 : x3 - 2;
	    const qMarkY = isRight ? y3 + 30 : y3 + 32;
	
	    return `
	    <svg viewBox="0 0 180 120" style="max-width:220px; margin: 5px auto; display:block; overflow:visible;">
	        <path d="M ${x1} ${y1} L ${x2} ${y2} L ${x3} ${y3} Z" fill="none" stroke="var(--purple-dark)" stroke-width="2" />
	        
	        ${isRight ? 
	            `<path d="M ${x1} ${y1-15} L ${x1+15} ${y1-15} L ${x1+15} ${y1}" fill="none" stroke="var(--purple-mid)" stroke-width="1.5"/>` : 
	            drawArc(x1, y1, -1, 0) + `<text x="${x1+22}" y="${y1-5}" font-size="11" fill="var(--purple-deep)" font-weight="bold">${angleA}°</text>`
	        }
	
	        ${isRight ? drawArc(x2, y2, 3.14, 3.7) : drawArc(x2, y2, 3.14, 3.9)}
	        <text x="${x2-45}" y="${y2-5}" font-size="11" fill="var(--purple-deep)" font-weight="bold">${angleB}°</text>
	        
	        ${isRight ? 
	            drawArc(x3, y3, 0.55, 1.57) : 
	            drawArc(x3, y3, 0.68, 2.05) // Arc réduit pour ne plus dépasser à droite
	        }
	        <text x="${qMarkX}" y="${qMarkY}" font-size="16" fill="var(--red-dark)" font-weight="bold">?</text>
	    </svg>`;
	}

	function generatePerimeterSVG(type, data) {
	    const color = "var(--purple-dark)";
	    const accent = "var(--purple-mid)";
	    const textColor = "var(--purple-deep)";
	    
	    let figure = "";
	    if (type === "losange") {
		    figure = `
		        <path d="M 90 20 L 150 60 L 90 100 L 30 60 Z" fill="none" stroke="${color}" stroke-width="2" />
		        
		        <line x1="55" y1="35" x2="65" y2="45" stroke="${accent}" stroke-width="1.5" />
		        
		        <line x1="115" y1="45" x2="125" y2="35" stroke="${accent}" stroke-width="1.5" />
		        
		        <line x1="55" y1="85" x2="65" y2="75" stroke="${accent}" stroke-width="1.5" />
		        
		        <line x1="115" y1="75" x2="125" y2="85" stroke="${accent}" stroke-width="1.5" />
		        
		        <text x="135" y="40" font-size="12" fill="${textColor}" font-weight="bold">${data.cote} ${data.unit}</text>
		    `;
		} else if (type === "rectangle") {
		    const w = 120; // Largeur visuelle
		    const h = 60;  // Hauteur visuelle
		    const x = 30;  // Position X
		    const y = 30;  // Position Y
		    const s = 12;  // Taille du carré d'angle droit
		
		    figure = `
		        <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="none" stroke="${color}" stroke-width="2" />
		        
		        <path d="M ${x} ${y+s} L ${x+s} ${y+s} L ${x+s} ${y}" fill="none" stroke="${accent}" stroke-width="1" /> <path d="M ${x+w-s} ${y} L ${x+w-s} ${y+s} L ${x+w} ${y+s}" fill="none" stroke="${accent}" stroke-width="1" /> <path d="M ${x} ${y+h-s} L ${x+s} ${y+h-s} L ${x+s} ${y+h}" fill="none" stroke="${accent}" stroke-width="1" /> <path d="M ${x+w-s} ${y+h} L ${x+w-s} ${y+h-s} L ${x+w} ${y+h-s}" fill="none" stroke="${accent}" stroke-width="1" /> <text x="${x + w/2}" y="${y - 8}" text-anchor="middle" font-size="12" fill="${textColor}" font-weight="bold">${data.L} ${data.unit}</text>
		        <text x="${x + w + 5}" y="${y + h/2 + 5}" font-size="12" fill="${textColor}" font-weight="bold">${data.l} ${data.unit}</text>
		    `;
		}  else if (type === "disque") {
			const isRayon = data.mode === "rayon";
			figure = `
				<circle cx="90" cy="60" r="40" fill="none" stroke="${color}" stroke-width="2" />
				<circle cx="90" cy="60" r="2" fill="${color}" />
				${isRayon ? 
					`<line x1="90" y1="60" x2="130" y2="60" stroke="${accent}" stroke-width="1.5" stroke-dasharray="3"/>
					 <text x="110" y="55" text-anchor="middle" font-size="11" fill="${textColor}" font-weight="bold">r = ${data.val} ${data.unit}</text>` :
					`<line x1="50" y1="60" x2="130" y2="60" stroke="${accent}" stroke-width="1.5" stroke-dasharray="3"/>
					 <text x="90" y="55" text-anchor="middle" font-size="11" fill="${textColor}" font-weight="bold">d = ${data.val} ${data.unit}</text>`
				}
			`;
		}
			
	    return `<svg viewBox="0 0 180 120" style="max-width:200px; margin: 5px auto; display:block; overflow:visible;">${figure}</svg>`;
	}

	
    const GENERATORS = {
        calc: [
            () => {
                const d1 = [2, 3, 4, 5][Math.floor(Math.random() * 4)];
                const k = [2, 3, 4][Math.floor(Math.random() * 3)];
                const d2 = d1 * k;
                const n1 = Math.floor(Math.random() * 5) + 1; 
                const n2 = Math.floor(Math.random() * 5) + 1;
                const reverse = Math.random() > 0.5;
                const q = reverse ? `\\frac{${n2}}{${d2}} + \\frac{${n1}}{${d1}}` : `\\frac{${n1}}{${d1}} + \\frac{${n2}}{${d2}}`;
                const numFinal = n1 * k + n2;
                return { q: `Calculer : $${q}$`, a: `${numFinal}/${d2}`, h: `Mets tout sur $${d2}$.` };
            },
            () => {
                const r = Math.random();
                let type, div, n;
                if (r < 0.33) {
                    type = "tiers"; div = 3;
                    const multiplesDeTrois = [12, 15, 18, 21, 24, 27, 30, 33, 36, 45, 60, 75, 90, 120, 360, 630, 915, 1200];
                    n = multiplesDeTrois[Math.floor(Math.random() * multiplesDeTrois.length)];
                } else if (r < 0.66) {
                    type = "quart"; div = 4; n = (Math.floor(Math.random() * 30) + 1) * 4;
                } else {
                    type = "moitié"; div = 2; n = (Math.floor(Math.random() * 100) + 1) * 2;
                }
                return { q: `Quel est le ${type} de $${n}$ ?`, a: (n / div).toString(), h: `Divise par $${div}$.` };
            },
            () => {
                const entry = SCI_DATABASE[Math.floor(Math.random()*SCI_DATABASE.length)];
                return { q: `Donner l'écriture scientifique de $${entry.v}$ <br><small>(Utilise * pour multiplier et ^ pour puissance)</small>`, a: entry.a, h: "Un chiffre non nul avant la virgule." };
            },
            () => {
                const getPGCD = (a, b) => b === 0 ? a : getPGCD(b, a % b);
                let n, d, pgcd;
                do { n = Math.floor(Math.random() * 40) + 2; d = Math.floor(Math.random() * 40) + 2; pgcd = getPGCD(n, d); } while (pgcd === 1 || n === d);
                return { q: `Simplifier au maximum : $\\frac{${n}}{${d}}$`, a: `${n/pgcd}/${d/pgcd}`, h: `Divise par $${pgcd}$.` };
            },
            () => {
                const p = [50, 25, 10][Math.floor(Math.random() * 3)];
                let v = p === 25 ? (Math.floor(Math.random() * 10) + 1) * 4 : (Math.floor(Math.random() * 20) + 1) * 10;
                return { q: `Calculer $${p}\\%$ de $${v}$`, a: ((v * p) / 100).toString().replace('.', ','), h: `Divise par ${100/p}.` };
            },
            () => {

		        const t11 = t8 + Math.floor(Math.random() * 4) + 2;
		        const t14 = t11 + Math.floor(Math.random() * 5) + 3;
		        const t17 = t14 + Math.floor(Math.random() * 3) + 1;
		        const t20 = t17 - (Math.floor(Math.random() * 3) + 1);
		        const temps = [t8, t11, t14, t17, t20];
		
		        // 2. Tirage au sort de l'intervalle pour la question
		        const idxA = Math.floor(Math.random() * 3); 
		        const idxB = idxA + 1 + Math.floor(Math.random() * (4 - idxA - 1));
		        const reponse = temps[idxB] - temps[idxA];
		
		        // 3. Paramètres du graphique
		        const padding = 30;
		        const width = 230;
		        const height = 150; // Augmenté pour plus de confort visuel
		        const xStep = (width - 2 * padding) / 4;
		        const yUnit = 4; 
		        const maxDeg = 25;
		
		        // 4. Construction du quadrillage complexe
		        let gridSVG = "";
		        for (let deg = 0; deg <= maxDeg; deg++) {
		            const y = height - padding - (deg * yUnit);
		            
		            if (deg % 5 === 0) {
		                // Lignes principales tous les 5 degrés
		                gridSVG += `
		                    <line x1="${padding}" y1="${y}" x2="${width - 15}" y2="${y}" stroke="rgba(0,0,0,0.35)" stroke-width="0.8" />
		                    <text x="${padding - 5}" y="${y + 3}" font-size="8" text-anchor="end" font-weight="bold">${deg}°</text>
		                `;
		            } else {
		                // Lignes secondaires tous les 1 degré
		                gridSVG += `
		                    <line x1="${padding}" y1="${y}" x2="${width - 15}" y2="${y}" stroke="rgba(0,0,0,0.2)" stroke-width="0.5"/>
		                `;
		            }
		        }
		
		        // 5. Tracé de la courbe et des points
		        let pointsStr = "";
		        let markers = "";
		        let xLabels = "";
		
		        temps.forEach((t, i) => {
		            const x = padding + i * xStep;
		            const y = height - padding - (t * yUnit);
		            pointsStr += `${x},${y} `;
		            markers += `<circle cx="${x}" cy="${y}" r="3" fill="var(--red-dark)" />`;
		            xLabels += `
		                <line x1="${x}" y1="${height - padding}" x2="${x}" y2="${height - padding + 4}" stroke="black" />
		                <text x="${x}" y="${height - 12}" font-size="9" text-anchor="middle">${labels[i]}</text>
		            `;
		        });
		
		        const svg = `
		        <div style="text-align:center; margin: 15px 0;">
		            <svg viewBox="0 0 ${width} ${height}" class="svg-math" style="max-width:320px; background:white; border-radius:8px; border: 1px solid #eee;">
		                ${gridSVG}
		                <line x1="${padding}" y1="${height - padding}" x2="${width - 10}" y2="${height - padding}" stroke="black" stroke-width="1.2" />
		                <line x1="${padding}" y1="${height - padding}" x2="${padding}" y2="10" stroke="black" stroke-width="1.2" />
		                
		                <polyline points="${pointsStr}" fill="none" stroke="var(--red-mid)" stroke-width="2.5" stroke-linejoin="round" />
		                ${markers}
		                ${xLabels}
		                
		                <text x="${width/2 + 10}" y="${height - 2}" font-size="8" font-weight="bold" text-anchor="middle">Heure de la journée</text>
		            </svg>
		        </div>`;
		
		        return {
		            q: `Le graphique représente l'évolution de la température sur une journée. <br> <b>De combien de degrés la température a-t-elle augmenté entre ${labels[idxA]} et ${labels[idxB]} ?</b> ${svg}`,
		            a: reponse.toString()
		        };
		    }
        ],
        scratch: [
            // ── RECTANGLE ──────────────────────────────────────────────────────
            () => {
                const missingAngle = Math.random() > 0.5;
                const longueur = [80,100,120,150][Math.floor(Math.random()*4)];
                const largeur  = [40,50,60,70,80][Math.floor(Math.random()*5)];

                const svg = buildScratchSVG([
                    { type:'hat',    label:'Quand 🚩 est cliqué' },
                    { type:'pen',    label:'🖊️ Stylo en position d\'écriture' },
                    { type:'repeat', label:`Répéter 4 fois`, blank: !missingAngle },
                    { type:'move',   label:`Avancer de ${longueur}` },
                    { type:'turn',   label:`Tourner de 90°`, blank: missingAngle },
                    { type:'move',   label:`Avancer de ${largeur}` },
                    { type:'turn',   label:`Tourner de 90°`, blank: missingAngle },
                    { type:'endrepeat' }
                ],0);

                return {
                    q: `Voici un script Scratch qui trace un <b>rectangle</b>. Trouve le nombre manquant&nbsp;:<br>${svg}`,
                    a: missingAngle ? '90' : '2',
                    h: missingAngle
                        ? 'Un rectangle a 4 angles droits à 90°.'
                        : 'Un rectangle a 4 côtés (2 paires) → il faut répéter 2 fois.',
                    t: 'scratch'
                };
            },

            // ── CARRÉ ──────────────────────────────────────────────────────────
            () => {
                const missingAngle = Math.random() > 0.5;
                const cote = [60,80,100,120][Math.floor(Math.random()*4)];

                const svg = buildScratchSVG([
                    { type:'hat',    label:'Quand 🚩 est cliqué' },
                    { type:'pen',    label:'🖊️ Stylo en position d\'écriture' },
                    { type:'repeat', label:`Répéter 4 fois`, blank: !missingAngle },
                    { type:'move',   label:`Avancer de ${cote}` },
                    { type:'turn',   label:`Tourner de 90°`, blank: missingAngle },
                    { type:'endrepeat' }
                ],0);

                return {
                    q: `Voici un script Scratch qui trace un <b>carré</b>. Trouve le nombre manquant&nbsp;:<br>${svg}`,
                    a: missingAngle ? '90' : '4',
                    h: missingAngle
                        ? 'Un carré a 4 angles droits à 90°.'
                        : 'Un carré a 4 côtés → il faut répéter 4 fois.',
                    t: 'scratch'
                };
            },

            // ── TRIANGLE ÉQUILATÉRAL ────────────────────────────────────────────
            () => {
                const missingAngle = Math.random() > 0.5;
                const cote = [60,80,100,120][Math.floor(Math.random()*4)];

                const svg = buildScratchSVG([
                    { type:'hat',    label:'Quand 🚩 est cliqué' },
                    { type:'pen',    label:'🖊️ Stylo en position d\'écriture' },
                    { type:'repeat', label:`Répéter 3 fois`, blank: !missingAngle },
                    { type:'move',   label:`Avancer de ${cote}` },
                    { type:'turn',   label:`Tourner de 120°`, blank: missingAngle },
                    { type:'endrepeat' }
                ],0);

                return {
                    q: `Voici un script Scratch qui trace un <b>triangle équilatéral</b>. Trouve le nombre manquant&nbsp;:<br>${svg}`,
                    a: missingAngle ? '120' : '3',
                    h: missingAngle
                        ? '360° ÷ 3 côtés = 120° par rotation.'
                        : 'Un triangle a 3 côtés → il faut répéter 3 fois.',
                    t: 'scratch'
                };
            },

            // ── ALGORITHME : trace le déroulement du programme ─────────────────
            () => {
                // Valeur de départ choisie parmi des petits entiers simples
                const startVal = [2, 3, 4, 5, 6, 7, 8, 10][Math.floor(Math.random() * 8)];

                // Catalogue d'opérations possibles : { desc (SVG expr), fn, hint }
                // On construit un programme de 2 opérations dont le résultat reste ≤ 100
                const OPS = [
                    { desc: () => [{kind:'op',val:'*'},{kind:'num',val:'2'}],  fn: v => v * 2,  txt: v => `${v} * 2` },
                    { desc: () => [{kind:'op',val:'*'},{kind:'num',val:'3'}],  fn: v => v * 3,  txt: v => `${v} * 3` },
                    { desc: () => [{kind:'op',val:'*'},{kind:'num',val:'4'}],  fn: v => v * 4,  txt: v => `${v} * 4` },
                    { desc: () => [{kind:'op',val:'*'},{kind:'num',val:'5'}],  fn: v => v * 5,  txt: v => `${v} * 5` },
                    { desc: () => [{kind:'op',val:'+'},{kind:'num',val:'10'}], fn: v => v + 10, txt: v => `${v} + 10` },
                    { desc: () => [{kind:'op',val:'+'},{kind:'num',val:'5'}],  fn: v => v + 5,  txt: v => `${v} + 5`  },
                    { desc: () => [{kind:'op',val:'+'},{kind:'num',val:'8'}],  fn: v => v + 8,  txt: v => `${v} + 8`  },
                    { desc: () => [{kind:'op',val:'-'},{kind:'num',val:'1'}],  fn: v => v - 1,  txt: v => `${v} - 1`  },
                    { desc: () => [{kind:'op',val:'/'},{kind:'num',val:'2'}],  fn: v => v / 2,  txt: v => `${v} / 2`, ok: v => v % 2 === 0 && v >= 4 },
                ];

                // Tire 2 opérations compatibles avec startVal sans dépasser 100
                let val = startVal;
                const chosen = [];
                const shuffled = OPS.slice().sort(() => Math.random() - 0.5);
                for (const op of shuffled) {
                    if (chosen.length >= 2) break;
                    if (op.ok && !op.ok(val)) continue;
                    const next = op.fn(val);
                    if (next > 100 || next < 0 || !Number.isInteger(next)) continue;
                    chosen.push({ op, fromVal: val });
                    val = next;
                }
                // Fallback si pas assez d'opérations valides
                if (chosen.length < 2) {
                    val = startVal;
                    chosen.length = 0;
                    chosen.push({ op: OPS[4], fromVal: val }); val = OPS[4].fn(val);
                    chosen.push({ op: OPS[0], fromVal: val }); val = OPS[0].fn(val);
                }

                const finalVal = val;

                // Construction des blocs :
                // Chapeau → Demander → mettre résultat à réponse → mettre résultat à résultat OP n → … → Dire
                const blocks = [
                    { type: 'hat' },
                    { type: 'ask', msg: 'Choisir un nombre' },
                    { type: 'setvar', label: 'résultat', expr: [{kind:'reply', val:'réponse'}] },
                ];
                for (const c of chosen) {
                    const opToks = c.op.desc();
                    // expr = [ puce variable "résultat" ] [ opérateur ] [ nombre ]
                    const expr = [{kind:'var', val:'résultat'}, ...opToks];
                    blocks.push({ type: 'setvar', label: 'résultat', expr });
                }
                blocks.push({ type: 'say', msg: 'J\'obtiens :', varName: 'résultat' });

                const svg = buildScratchSVG(blocks, 80);

                // Hint : déroulé du calcul étape par étape
                let hintSteps = `résultat ← ${startVal}`;
                let v2 = startVal;
                for (const c of chosen) {
                    const next = c.op.fn(v2);
                    hintSteps += ` → résultat ← ${c.op.txt(v2)} = ${next}`;
                    v2 = next;
                }

                return {
                    q: `On choisit <b>${startVal}</b> comme nombre de départ. Quel nombre le lutin va-t-il dire ?<br>${svg}`,
                    a: String(finalVal),
                    h: hintSteps,
                    t: 'scratch'
                };
            }
        ]
    };

    // ── Constructeur de blocs Scratch SVG ──────────────────────────────────────
    function buildScratchSVG(blocks, offset) {
        const W      = 210 + offset;
        const hatH   = 40;
        const blockH = 34;
        const repH   = 38;
        const endH   = 14;
        const barW   = 14;
        const innerX = 4 + barW + 4;
        const innerW = W - 8 - barW - 4;
        const gap    = 3;

        const C = {
            hat:        '#FFAB18',
            repeat:     '#FF8C1A',
            repeatDark: '#DB6E00',
            move:       '#4C97FF',
            moveDark:   '#3373CC',
            pen:        '#59C059',
            penDark:    '#389438',
            variable:   '#FF8C1A', // Variables : orange
            variableDark:'#DB6E00',
            varChip:    '#FF6680', // puce nom de variable : rose-rouge
            varChipDk:  '#CC0033',
            operator:   '#59C059', // Opérateurs : vert
            operatorDk: '#389438',
            say:        '#9966FF', // Looks/Dire : violet
            sayDark:    '#7744CC',
            text:       '#ffffff',
        };
		

        // ── Badge ovale générique ────────────────────────────────────────────
        function oval(x, y, w, h, fill, stroke, dasharray, label, labelFill, fontSize) {
            let o = `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${h/2}" fill="${fill}"`;
            if (stroke) o += ` stroke="${stroke}" stroke-width="2"`;
            if (dasharray) o += ` stroke-dasharray="${dasharray}"`;
            o += `/>`;
            o += `<text x="${x + w/2}" y="${y + h/2 + 4}" text-anchor="middle" font-size="${fontSize||12}" font-weight="bold" fill="${labelFill}" font-family="sans-serif">${label}</text>`;
            return o;
        }

        // ── Bloc simple avec badges auto sur les nombres ─────────────────────
        function simpleBlock(bx, by, bw, bh, col, colDark, label, hasBlank) {
            let out = `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="5" fill="${col}"/>`;
            out += `<rect x="${bx}" y="${by + bh - 4}" width="${bw}" height="4" rx="3" fill="${colDark}" opacity="0.45"/>`;
            const tmid = by + bh / 2 + 5;
            const tx   = bx + 12;
            const parts = label.split(/(\d+)/);
            let cx = tx;
            parts.forEach(p => {
                if (/^\d+$/.test(p)) {
                    if (hasBlank) {
                        out += oval(cx - 2, by + 7, 34, 20, 'white', colDark, '4,2', '?', colDark, 14);
                    } else {
                        out += oval(cx - 2, by + 7, 34, 20, 'rgba(255,255,255,0.28)', null, null, p, C.text, 13);
                    }
                    cx += 38;
                } else if (p) {
                    out += `<text x="${cx}" y="${tmid}" font-size="12" font-weight="bold" fill="${C.text}" font-family="sans-serif">${p}</text>`;
                    cx += p.length * 7.2;
                }
            });
            return out;
        }
		
		
        // ── Passe 1 : calcul des y ───────────────────────────────────────────
        let y = 4;
        let repeatStartY = null, endRepeatY = null;
        const computed = [];
        for (const b of blocks) {
            computed.push({ ...b, y });
            if      (b.type === 'hat')       y += hatH;
            else if (b.type === 'pen')       y += blockH;
            else if (b.type === 'repeat')  { repeatStartY = y; y += repH; }
            else if (b.type === 'move' || b.type === 'turn') y += blockH + gap;
            else if (b.type === 'setvar')    y += blockH + gap;
            else if (b.type === 'ask')       y += blockH + gap;
            else if (b.type === 'say')       y += blockH + gap;
            else if (b.type === 'endrepeat'){ endRepeatY = y; y += endH; }
        }
        const totalH = y + 8;

        // ── Passe 2 : rendu ──────────────────────────────────────────────────
        let svgParts = [];

        // Barre orange verticale de boucle
        if (repeatStartY !== null && endRepeatY !== null) {
            svgParts.push(`<rect x="4" y="${repeatStartY + repH}" width="${barW}" height="${endRepeatY - (repeatStartY + repH) + endH}" fill="${C.repeat}"/>`);
        }

        for (const b of computed) {
            const by = b.y;

            // CHAPEAU
            if (b.type === 'hat') {
                svgParts.push(`
                  <rect x="4" y="${by}" width="${W-8}" height="${hatH}" rx="14" fill="${C.hat}"/>
                  <rect x="4" y="${by + hatH - 14}" width="${W-8}" height="14" fill="${C.hat}"/>
                `);
                svgParts.push(`<text x="${W/2}" y="${by + hatH/2 + 5}" text-anchor="middle" font-size="12" font-weight="bold" fill="${C.text}" font-family="sans-serif">Quand 🏳️ est cliqué</text>`);

            // STYLO
            } else if (b.type === 'pen') {
                svgParts.push(simpleBlock(4, by, W-8, blockH, C.pen, C.penDark, b.label, false));

            // RÉPÉTER
            } else if (b.type === 'repeat') {
                svgParts.push(`<rect x="4" y="${by}" width="${W-8}" height="${repH}" rx="5" fill="${C.repeat}"/>`);
                svgParts.push(`<rect x="4" y="${by+repH-4}" width="${W-8}" height="4" rx="3" fill="${C.repeatDark}" opacity="0.45"/>`);
                svgParts.push(`<text x="16" y="${by+repH/2+5}" font-size="12" font-weight="bold" fill="${C.text}" font-family="sans-serif">Répéter</text>`);
                const num = b.label.match(/\d+/)?.[0] || '';
                if (b.blank) {
                    svgParts.push(oval(82, by+9, 34, 20, 'white', C.repeatDark, '4,2', '?', C.repeatDark, 14));
                } else {
                    svgParts.push(oval(82, by+9, 34, 20, 'rgba(255,255,255,0.28)', null, null, num, C.text, 13));
                }
                svgParts.push(`<text x="122" y="${by+repH/2+5}" font-size="12" font-weight="bold" fill="${C.text}" font-family="sans-serif">fois</text>`);

            // MOVE / TURN
            } else if (b.type === 'move' || b.type === 'turn') {
                svgParts.push(simpleBlock(innerX, by, innerW, blockH, C.move, C.moveDark, b.label, b.blank));

            // FIN RÉPÉTER
            } else if (b.type === 'endrepeat') {
                svgParts.push(`<rect x="4" y="${by}" width="${W-8}" height="${endH}" rx="5" fill="${C.repeat}"/>`);

            // ── METTRE [variable] À [expr] ─────────────────────────────────
            // b.label = nom de la variable, b.expr = tableau de tokens
            // token : { kind:'text'|'num'|'var'|'op'|'reply', val }
            } else if (b.type === 'setvar') {
                const bx = 4, bw = W - 8 ;
                svgParts.push(`<rect x="${bx}" y="${by}" width="${bw}" height="${blockH}" rx="5" fill="${C.variable}"/>`);
                svgParts.push(`<rect x="${bx}" y="${by+blockH-4}" width="${bw}" height="4" rx="3" fill="${C.variableDark}" opacity="0.45"/>`);

                let cx = bx + 10;
                const mid = by + blockH/2 + 5;

                // "mettre"
                svgParts.push(`<text x="${cx}" y="${mid}" font-size="11" font-weight="bold" fill="${C.text}" font-family="sans-serif">mettre</text>`);
                cx += 48;

                // puce nom variable (rose arrondie)
                const vname = b.label;
                const vnameW = Math.max(36, vname.length * 7 + 16);
                svgParts.push(oval(cx, by+8, vnameW, 18, C.varChip, null, null, vname, C.text, 11));
                cx += vnameW + 6;

                // "à"
                svgParts.push(`<text x="${cx}" y="${mid}" font-size="11" font-weight="bold" fill="${C.text}" font-family="sans-serif">à</text>`);
                cx += 14;

                // expression : tableau de tokens
                for (const tok of b.expr) {
                    if (tok.kind === 'num') {
                        // badge blanc semi-transparent, largeur adaptée au contenu
                        const nw = Math.max(24, String(tok.val).length * 8 + 14);
                        svgParts.push(oval(cx, by+8, nw, 18, 'rgba(255,255,255,0.28)', null, null, tok.val, C.text, 11));
                        cx += nw + 4;
                    } else if (tok.kind === 'var') {
                        const tw = Math.max(36, tok.val.length * 7 + 16);
                        svgParts.push(oval(cx, by+8, tw, 18, C.varChip, null, null, tok.val, C.text, 11));
                        cx += tw + 4;
                    } else if (tok.kind === 'reply') {
                        // puce "réponse" en bleu ciel (même couleur que le bloc demander)
                        const rw = Math.max(42, tok.val.length * 7 + 16);
                        svgParts.push(oval(cx, by+8, rw, 18, C.move, null, null, tok.val, C.text, 11));
                        cx += rw + 4;
                    } else if (tok.kind === 'op') {
                        // opérateur dans ellipse verte, un peu plus large pour * et /
                        const ow = Math.max(20, String(tok.val).length * 9 + 10);
                        svgParts.push(oval(cx - 2, by+7, ow, 20, C.operator, null, null, tok.val, C.text, 13));
                        cx += ow + 2;
                    } else {
                        svgParts.push(`<text x="${cx}" y="${mid}" font-size="11" font-weight="bold" fill="${C.text}" font-family="sans-serif">${tok.val}</text>`);
                        cx += tok.val.length * 7;
                    }
                }

            // ── DEMANDER … ET ATTENDRE ─────────────────────────────────────
            } else if (b.type === 'ask') {
                const bx = 4, bw = W - 8;
                svgParts.push(`<rect x="${bx}" y="${by}" width="${bw}" height="${blockH}" rx="5" fill="${C.move}"/>`);
                svgParts.push(`<rect x="${bx}" y="${by+blockH-4}" width="${bw}" height="4" rx="3" fill="${C.moveDark}" opacity="0.45"/>`);
                let cx = bx + 10;
                const mid = by + blockH/2 + 5;
                svgParts.push(`<text x="${cx}" y="${mid}" font-size="11" font-weight="bold" fill="${C.text}" font-family="sans-serif">demander</text>`);
                cx += 68;
                const msgW = Math.max(60, b.msg.length * 6.5 + 14);
                svgParts.push(oval(cx, by+8, msgW, 18, 'white', null, null, b.msg, '#333', 10));
                cx += msgW + 6;
                svgParts.push(`<text x="${cx}" y="${mid}" font-size="11" font-weight="bold" fill="${C.text}" font-family="sans-serif">et attendre</text>`);

            // ── DIRE [texte] ET [variable] ─────────────────────────────────
            } else if (b.type === 'say') {
                const bx = 4, bw = W - 8;
                svgParts.push(`<rect x="${bx}" y="${by}" width="${bw}" height="${blockH}" rx="5" fill="${C.say}"/>`);
                svgParts.push(`<rect x="${bx}" y="${by+blockH-4}" width="${bw}" height="4" rx="3" fill="${C.sayDark}" opacity="0.45"/>`);

                let cx = bx + 10;
                const mid = by + blockH/2 + 5;
                svgParts.push(`<text x="${cx}" y="${mid}" font-size="11" font-weight="bold" fill="${C.text}" font-family="sans-serif">dire</text>`);
                cx += 30;

                // bulle de texte blanc pour la chaîne
                const msgW = b.msg.length * 6.5 + 14;
                svgParts.push(oval(cx, by+8, msgW, 18, 'white', null, null, b.msg, '#333', 10));
                cx += msgW + 6;

                // "et"
                svgParts.push(`<text x="${cx}" y="${mid}" font-size="11" font-weight="bold" fill="${C.text}" font-family="sans-serif">et</text>`);
                cx += 18;

                // puce variable résultat
                const rv = b.varName || 'résultat';
                const rvW = Math.max(30, rv.length * 7 + 14);
                svgParts.push(oval(cx, by+8, rvW, 18, C.varChip, null, null, rv, C.text, 11));
            }
        }

        return `<div style="display:flex;justify-content:center;margin:10px 0;">
          <svg viewBox="0 0 ${W} ${totalH}" style="width:100%;max-width:${W}px;font-family:sans-serif;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.15));">
            ${svgParts.join('')}
          </svg>
        </div>`;
    }

    let session = [], currentIdx = 0, score = 0, isLocked = false;

	 // ── Génération sans répétition ──────────────────────────────────────────
    function buildSession(theme) {
        const cats = theme === 'tout' ? Object.keys(GENERATORS).filter(k => k !== 'scratch') : [theme];
        const pool = [];
        // Crée un pool large (jusqu'à 40 tentatives) puis déduplique par texte
        const seen = new Set();
        let tries = 0;
        while (pool.length < 10 && tries < 80) {
            tries++;
            const cat = cats[Math.floor(Math.random() * cats.length)];
            const gen = GENERATORS[cat][Math.floor(Math.random() * GENERATORS[cat].length)];
            const q = gen();
            // Clé de déduplication : les 60 premiers caractères de l'énoncé
            const key = q.q.replace(/<[^>]+>/g, '').trim().slice(0, 60);
            if (!seen.has(key)) {
                seen.add(key);
                pool.push(q);
            }
        }
        // Complète si le pool est insuffisant (thème très petit)
        while (pool.length < 10) {
            const cat = cats[Math.floor(Math.random() * cats.length)];
            const gen = GENERATORS[cat][Math.floor(Math.random() * GENERATORS[cat].length)];
            pool.push(gen());
        }
        return pool;
    }

	
    function startQuiz(theme) {
        renderMathInElement(document.querySelector('.math-shortcuts'), {
            delimiters: [{left: "$", right: "$", display: false}]
        });
        session = buildSession(theme);
        currentIdx = 0; score = 0;
        const labels = { calc: '🔢 Nombres & calculs', alg: '🧩 Calcul littéral', geo: '📐 Géométrie', proba: '📊 Proba & stats', scratch: '🐱 Scratch', tout: '🚀 Tous les thèmes' };
        document.getElementById('label-theme').textContent = labels[theme] || 'Entraînement';
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        isLocked = false;
        const q = session[currentIdx];
        const el = document.getElementById('question-text');
        el.innerHTML = q.q;
        renderMathInElement(el, { delimiters: [{left: "$", right: "$", display: false}] });
        const input = document.getElementById('answer-input');
        input.value = ''; input.disabled = false; input.focus();
        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('submit-btn').classList.remove('hidden');
        document.getElementById('progress-bar').style.width = (currentIdx * 10) + '%';
        document.getElementById('live-score').textContent = score;
    }
	
	function normalizeAlgebra(str) {
	    if (!str) return "";
	    
	    // 1. Nettoyage de base et harmonisation des carrés
	    let s = str.toLowerCase()
	               .replace(/\s+/g, '')       // Supprime les espaces
	               .replace(/²/g, '^2')       // RECTIFICATION : transforme ² en ^2 systématiquement
	               .replace(/-/g, '+-');      // Prépare le découpage des termes
	    
	    // 2. Découpage par les '+'
	    let terms = s.split('+').filter(t => t !== "");
	    
	    // 3. Transformation des termes (ex: "t" -> "1t", "-x" -> "-1x")
	    terms = terms.map(t => {
	        // On cherche une lettre (x, t, a, b...) qui n'est pas précédée d'un chiffre
	        // Cette regex gère n'importe quelle variable alphabétique
	        if (/^[-+]?[a-z]/.test(t) && !/^[-+]?\d/.test(t)) {
	            return t.replace(/([a-z])/, '1$1');
	        }
	        return t;
	    });
	
	    // 4. Tri intelligent : Puissances décroissantes (t^2, puis t, puis constante)
	    terms.sort((a, b) => {
	        const getPower = (term) => {
	            if (term.includes('^2')) return 2;
	            // Si le terme contient une lettre mais pas de ^2, c'est puissance 1
	            if (/[a-z]/.test(term)) return 1;
	            return 0;
	        };
	        
	        const pA = getPower(a);
	        const pB = getPower(b);
	        
	        if (pA !== pB) return pB - pA;
	        return a.localeCompare(b); // Tri alphabétique si même puissance
	    });
	
	    // 5. Nettoyage final pour l'affichage/comparaison
	    return terms.join('+').replace(/\+\-/g, '-');
	}

	function insertSymbol(symbol) {
	    const input = document.getElementById('answer-input');
	    const start = input.selectionStart;
	    const end = input.selectionEnd;
	    const text = input.value;
	
	    // Insère le symbole à la position du curseur
	    input.value = text.slice(0, start) + symbol + text.slice(end);
	
	    // Repositionne le curseur juste après le symbole inséré
	    input.selectionStart = input.selectionEnd = start + symbol.length;
	
	    // Redonne le focus à l'input pour que l'élève continue de taper
	    input.focus();
	}
	
    function handleValidation() {
    if(isLocked) return;
    const inputEl = document.getElementById('answer-input');
    const userRaw = inputEl.value.trim().toLowerCase().replace(',', '.');
    const q = session[currentIdx];
    const correctRaw = q.a.toLowerCase().replace(',', '.');
    let isCorrect = false;
	let partial = false;
		
    const clean = (s) => s.replace(/\s+/g, '');

	// 0. TRIGONOMÉTRIE (rapport de deux segments)
    if (q.q.includes("Quel rapport faut-il")) {
        // Accepte AB/CD, BA/CD, AB/DC, BA/DC — on trie les lettres de chaque segment
        const normSeg = (s) => clean(s).split('/').map(p => p.split('').sort().join('')).join('/');
        if (normSeg(userRaw) === normSeg(correctRaw)) isCorrect = true;
    }
	// Gestion unités
	else if (q.q.includes("Calcule") && (q.a.includes("cm") || q.a.includes("m") || q.a.includes("mm"))) {
	    // On nettoie tout : espaces, virgules, et les commandes KaTeX \text{ }
	    const userClean = userRaw.toLowerCase().replace(/\s/g, '').replace(',', '.');
	    const correctClean = q.a.toLowerCase()
	        .replace(/\\text\{/g, '') // Retire \text{
	        .replace(/\}/g, '')       // Retire }
	        .replace(/\s/g, '')       // Retire les espaces
	        .replace(',', '.');
	    
	    const userValue = userClean.replace(/[a-z]/g, '');
	    const correctValue = correctClean.replace(/[a-z]/g, '');
	
	    if (userClean === correctClean) {
	        isCorrect = true;
	    } else if (userValue === correctValue) {
	        partial = true;
	    }
	}
    // 1. THALÈS (Rapports)
    else if (q.q.includes("rapports de Thalès")) {
        const uR = clean(userRaw).split('=');
        const cR = clean(correctRaw).split('=');
        if (uR.length === 3) {
            const norm = (r) => r.split('/').map(s => s.split('').sort().join('')).sort().join('/');
            const uSet = uR.map(norm).sort().join('|');
            const cSet = cR.map(norm).sort().join('|');
            const cInv = cR.map(r => norm(r.split('/').reverse().join('/'))).sort().join('|');
            if (uSet === cSet || uSet === cInv) isCorrect = true;
        }
    }
    // 2. PYTHAGORE
    else if (q.q.includes("égalité de Pythagore")) {
	    const cleanUser = userRaw.replace(/\s+/g, '');
	    if (!cleanUser.includes('=')) { 
	        isCorrect = false; 
	    } else {
	        const [uL, uR] = cleanUser.split('=');
	        const [cL, cR] = correctRaw.replace(/\s+/g, '').split('=');
	
	        const normMembre = (membre) => {
	            return membre.split('+').map(seg => {
	                // Regex : cherche exactement 2 lettres + un carré (², ^2 ou 2)
	                const match = seg.match(/^([a-z]{2})(²|\^2|2)$/);
	                if (!match) return "INVALID"; 
	                return match[1].split('').sort().join('') + "2";
	            }).sort().join('+');
	        };
	
	        const uL_norm = normMembre(uL);
	        const uR_norm = normMembre(uR);
	        
	        // Si l'utilisateur a tapé "1", uL_norm sera "INVALID"
	        if (uL_norm.includes("INVALID") || uR_norm.includes("INVALID")) {
	            isCorrect = false;
	        } else {
	            const cL_norm = normMembre(cL);
	            const cR_norm = normMembre(cR);
	            isCorrect = (uL_norm === cL_norm && uR_norm === cR_norm) || 
	                        (uL_norm === cR_norm && uR_norm === cL_norm);
	        }
	    }
	}
		// Validation températures
	else if (q.q.includes("température")) {
		const userCleaned = userRaw.toLowerCase()
		    .replace(/\s/g, '')
		    .replace('°c', '')
		    .replace('°', '')
		    .replace('c', '')
		    .replace('degres', '')
		    .replace('degre', '');
		if (userCleaned === q.a.toLowerCase().replace(/\s/g, '')) {
   			 isCorrect = true;
		}
	}
		// Validation Périmètres
	else if (q.q.includes("périmètre")) {
	    const userClean = userRaw.toLowerCase().replace(/\s/g, '').replace(',', '.');
	    const perimCorrect = q.a.toLowerCase().replace(/\\text\{/g, '').replace(/\}/g, '').replace(/\s/g, '').replace(',', '.');
	    
	    const userNum = parseFloat(userClean);
	    const correctNum = parseFloat(perimCorrect);
	    const hasUnit = userClean.includes('cm') || userClean.includes('m');
	
	    if (!isNaN(userNum)) {
	        // SI c'est un disque -> marge de 0.11 | SINON -> égalité stricte (marge 0.01)
	        const margin = q.q.includes("disque") ? 0.11 : 0.01;
	        const isValueCorrect = Math.abs(userNum - correctNum) < margin;
	
	        if (isValueCorrect && hasUnit) {
	            isCorrect = true;
	        } else if (isValueCorrect && !hasUnit) {
	            partial = true;
	        }
	    }
	}
	// Validation Somme des angles avec gestion du score partiel
	else if (q.q.includes("angle manquant")) {
	    const userClean = userRaw.replace(/\s/g, '');
	    const correctClean = q.a.replace(/\s/g, ''); // Contient le "°"
	    
	    const userValue = userClean.replace('°', '');
	    const correctValue = correctClean.replace('°', '');
	
	    if (userClean === correctClean) {
	        isCorrect = true;
	    } else if (userValue === correctValue) {
	        // L'élève a mis la bonne valeur numérique mais a oublié le "°"
	        partial = true; 
	    }
	}
	//Fraction uniquement irréductible dans simplifier
	else if (q.q.includes("Simplifier au maximum")) {
	    const uClean = userRaw.replace(/\s+/g, '');
	    const cClean = correctRaw.replace(/\s+/g, '');
	    
	    // Cas 1 : Correspondance exacte (ex: 3/4)
	    if (uClean === cClean) {
	        isCorrect = true;
	    } 
	    // Cas 2 : Le résultat est un entier (ex: attendu "5/1", reçu "5")
	    else if (cClean.endsWith('/1')) {
	        const integerPart = cClean.split('/')[0];
	        if (uClean === integerPart) {
	            isCorrect = true;
	        }
	    }
	}
	// ecriture scientifique
	else if (q.q.includes("scientifique")) {
	    // 1. On nettoie la réponse utilisateur (espaces, virgules, croix et x -> étoile)
	    let u = userRaw.replace(/\s/g, '').replace(',', '.').replace('×', '*').replace('x', '*');
	    
	    // 2. On nettoie la réponse attendue (LaTeX, accolades, espaces, virgules -> étoile)
	    let c = q.a.replace(/\\times/g, '*')
	               .replace(/[\{\}]/g, '')
	               .replace(/\s/g, '')
	               .replace(',', '.');
	    
	    // 3. Comparaison (on accepte avec ou sans le symbole ^ selon la saisie)
	    if (u === c || u === c.replace('^', '')) {
	        isCorrect = true;
	    }
	}
	// Validation des durées
	else if (q.q.includes("minutes")) {
	    let u = userRaw.toLowerCase().replace(/\s/g, '').replace('heures', 'h').replace('heure', 'h'); // Réponse élève nettoyée
	    let c = q.a.toLowerCase()
               .replace(/\\text\{/g, '')
               .replace(/\}/g, '')
               .replace(/\s/g, '');  // Réponse attendue nettoyée
	
	    // 1. CAS PARFAIT : l'élève a mis les bonnes unités (ex: 1h30min, 45min, 1h)
	    // On accepte aussi "0h45min" si la réponse attendue est "45min"
	    if (u === c || u === "0h" + c || u === c + "0min") {
	        isCorrect = true;
	    } 
	    // 2. CAS PARTIEL (0,5 pt) : il manque "min" mais les nombres sont bons (ex: 1h30)
	    else {
	        // On crée une version de la réponse attendue sans le "min" pour comparer
	        let cSansU = c.replace('min', '').replace('h', '');
			let uSansU = u.replace('min', '').replace('h', '');
	        if (uSansU === cSansU) {
	            partial = true;
	        }
	    }
	}

		
	//Accepter x= dans équation
	else if (q.q.includes("Résoudre")) {
        let userClean = clean(userRaw).replace('x=', '');
        let correctClean = clean(correctRaw).replace('x=', '');

        // Fonction pour convertir "7", "-7/-1" ou "1/2" en nombre décimal
        const toNum = (s) => {
            if (s.includes('/')) {
                const p = s.split('/');
                return parseFloat(p[0]) / parseFloat(p[1]);
            }
            return parseFloat(s);
        };

        const uVal = toNum(userClean);
        const cVal = toNum(correctClean);

        // Comparaison avec une petite marge d'erreur pour les arrondis
        if (!isNaN(uVal) && Math.abs(uVal - cVal) < 0.0001) {
            isCorrect = true;
        }
    }
    // 3. FRACTIONS & NOMBRES
    else if (correctRaw.includes('/')) {
        let uN, uD;
        if (userRaw.includes('/')) { const p = userRaw.split('/'); uN = Number(p[0]); uD = Number(p[1]); }
        else if (!isNaN(userRaw) && userRaw !== "") { uN = Number(userRaw); uD = 1; }
        if (uN !== undefined && !isNaN(uN) && !isNaN(uD) && uD !== 0) {
            const [cN, cD] = correctRaw.split('/').map(Number);
            if (uN * cD === cN * uD) isCorrect = true;
        }
	}
    // 4. RESTE (Algèbre, développement, réduction, etc.)
    else {
	    const userNorm = normalizeAlgebra(userRaw);
	    const correctNorm = normalizeAlgebra(correctRaw);
	    
	    if (userNorm === correctNorm) {
	        isCorrect = true;
	    }
	}

    // Affichage résultat
    isLocked = true;
    inputEl.disabled = true;
    document.getElementById('submit-btn').classList.add('hidden');
    const fb = document.getElementById('feedback');
    fb.classList.remove('hidden', 'correct', 'wrong');

	// On enregistre les données pour l'historique
    session[currentIdx].userAns = userRaw;
    session[currentIdx].status = isCorrect ? 'correct' : (partial ? 'partial' : 'wrong');
		
    if (isCorrect) {
	    score += 1;
	    fb.innerHTML = "✓ Parfait !";
	    fb.className = "feedback correct";
	} else if (partial) { // <--- Changé en 'partial' pour correspondre à votre variable
	    score += 0.5;
	    fb.innerHTML = `⚠ Valeur juste, mais attention à l'unité !<br>Réponse : $${q.a}$`;
	    fb.className = "feedback partial";
	} else {
	    fb.innerHTML = `✗ Réponse : $${q.a}$<br><small>${q.h}</small>`;
	    fb.className = "feedback wrong";
	}

    // CRUCIAL : Déclencher le rendu KaTeX sur le bloc feedback
    renderMathInElement(fb, {
        delimiters: [
            {left: "$$", right: "$$", display: true},
            {left: "$", right: "$", display: false}
        ],
        throwOnError: false
    });

    document.getElementById('live-score').textContent = score;
    setTimeout(next, isCorrect ? 1000 : 3000);
}

	
    function next() {
        currentIdx++;
        if(currentIdx < 10) {
            showQuestion();
        } else {
            showFinalResults();
        }
    }

    function showFinalResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        const resScreen = document.getElementById('result-screen');
        resScreen.classList.remove('hidden');
        document.getElementById('final-score-val').textContent = score;

        let html = `
        <div id="history-container" style="margin-top:20px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px;">
            <table style="width:100%; border-collapse: collapse; font-size: 0.85rem;">
                <thead>
                    <tr style="background-color: var(--purple-light); color: var(--purple-dark);">
                        <th style="padding: 12px; text-align: left;">Question</th>
                        <th style="padding: 12px; text-align: center;">Ta réponse</th>
                        <th style="padding: 12px; text-align: center;">Correction</th>
                    </tr>
                </thead>
                <tbody>`;

        session.forEach(q => {
		    let bgColor, textColor, icon;
		    
		    if (q.status === 'correct') {
		        bgColor = 'rgba(234, 243, 222, 0.7)';
		        textColor = 'var(--green-dark)';
		        icon = '✓';
		    } else if (q.status === 'partial') {
		        bgColor = 'rgba(255, 244, 229, 0.8)';
		        textColor = 'var(--orange-dark)';
		        icon = '⚠';
		    } else {
		        bgColor = 'rgba(252, 235, 235, 0.8)';
		        textColor = 'var(--red-dark)';
		        icon = '✗';
		    }
		
		    // Ici on garde TOUTE la question (q.q) pour inclure le SVG
		    // On ajoute un conteneur 'mini-svg' pour forcer la petite taille
		    html += `
		    <tr style="background-color: ${bgColor}; border-bottom: 1px solid rgba(0,0,0,0.05);">
		        <td style="padding: 10px 12px;" class="history-q-cell">
		            <div class="mini-svg-container">${q.q}</div>
		        </td>
		        <td style="padding: 10px 12px; text-align: center; color: ${textColor}; font-weight: bold;">
		            ${icon} ${q.userAns || '-'}
		        </td>
		        <td style="padding: 10px 12px; text-align: center;">$${q.a}$</td>
		    </tr>`;
		});

        html += `</tbody></table></div>`;
        
        // On insère le tableau juste avant le bouton "Retour au menu"
        const resultDiv = document.getElementById('result-screen');
        const existingTable = document.getElementById('history-container');
        if(existingTable) existingTable.remove(); // Évite les doublons si on revient
        
        // On l'insère avant le bouton
        resultDiv.querySelector('button').insertAdjacentHTML('beforebegin', html);
        
        // Rendu des maths
        renderMathInElement(resultDiv, { delimiters: [{left: "$", right: "$", display: false}] });
    }
    document.getElementById('answer-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleValidation(); });
</script>
